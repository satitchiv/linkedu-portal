[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  port = 8904
  publish = "public"
  functions = "netlify/functions"

[functions.parse-gdrive]
  timeout = 26

[functions.gmail-sync]
  timeout = 26

[functions.summarize-communications]
  timeout = 26

[functions.golf-trackman]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
