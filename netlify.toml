[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  port = 8904
  publish = "public"
  functions = "netlify/functions"

[functions.parse-gdrive]
  timeout = 26

[functions.gmail-sync]
  timeout = 26

[functions.summarize-communications]
  timeout = 26

[functions.golf-trackman]
  timeout = 26

[functions.line-bot]
  timeout = 26

[functions.process-school-doc]
  timeout = 26

[functions.save-school-doc]
  timeout = 26

[functions.add-child-by-token]
  timeout = 10

[functions.get-family]
  timeout = 10

[functions.add-child-self]
  timeout = 10

[functions.my-students]
  timeout = 10

[[redirects]]
  from = "/playgolf"
  to   = "/analyst.html"
  status = 200

[[redirects]]
  from = "/golfplanner"
  to   = "/golfplanner/index.html"
  status = 200

[[redirects]]
  from = "/golfplanner/*"
  to   = "/golfplanner/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/line-setup"
  to   = "/line-setup.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
