<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedU Parent Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Design tokens — LinkedU Bible (light) ─────────── */
    :root {
      --gold:     #B8962E;
      --gold-dim: #8a6e22;
      --bg:       #f5f0e8;
      --surface:  #ffffff;
      --surface2: #f5f0e8;
      --surface3: #ece7df;
      --border:   rgba(0,0,0,0.08);
      --text:     #1a1a1a;
      --muted:    #666;
      --muted2:   #999;
      --cream:    #f5f0e8;
      --red:      #c0392b;
      --amber:    #d68910;
      --green:    #27ae60;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .lang-th { display: none; }
    .portal-lang-th .lang-th { display: inline; }
    .portal-lang-th .lang-en { display: none; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { color: #daa520; }
    h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }

    /* ── Auth screen ───────────────────────────────────── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 36px;
    }
    .auth-card h2 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 24px;
    }
    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field-group input {
      width: 100%;
      background: #f5f0e8;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 4px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: var(--gold); }
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 11px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #caa938; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.4);
      border-radius: 4px;
      color: #e74c3c;
      font-size: 13px;
      display: none;
    }

    /* ── App shell ─────────────────────────────────────── */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    /* ── Header ────────────────────────────────────────── */
    #header {
      background: #1a1a1a;
      border-bottom: 1px solid #2c2c2c;
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }
    .header-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      color: var(--gold);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .header-student {
      flex: 1;
      color: #888;
      font-size: 12px;
    }
    .header-student span { color: #e8e3da; font-weight: 500; }
    .header-signout {
      font-size: 11px;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .header-signout:hover { color: #999; }
    .header-lang {
      font-size: 11px; color: #888; cursor: pointer;
      background: none; border: 1px solid #333;
      border-radius: 3px; padding: 3px 8px;
      font-family: 'Inter', sans-serif; letter-spacing: 0.03em;
      margin-right: 4px; transition: color 0.2s, border-color 0.2s;
    }
    .header-lang:hover { color: #ccc; border-color: #555; }

    /* ── Tab nav ───────────────────────────────────────── */
    #tabnav {
      background: var(--surface);
      border-bottom: 1px solid rgba(0,0,0,0.10);
      padding: 0 32px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── Main content ──────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 36px 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Loading ───────────────────────────────────────── */
    #loading {
      display: flex;
      position: fixed;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.05em;
    }
    #loading.hide { display: none; }

    /* ── Cards ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 16px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      cursor: default;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted2);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Section headers ───────────────────────────────── */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Badges ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-green  { background: rgba(39,174,96,.15);  color: #2ecc71; }
    .badge-amber  { background: rgba(214,137,16,.15); color: #f39c12; }
    .badge-red    { background: rgba(192,57,43,.15);  color: #e74c3c; }
    .badge-muted  { background: var(--surface2);      color: var(--muted); }
    .badge-gold   { background: rgba(184,150,46,.15); color: var(--gold); }

    /* ── Tables ────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted2);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      color: var(--text);
      font-size: 13px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,0,0,0.025); }

    /* ── Timeline ──────────────────────────────────────── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .tl-item {
      position: relative;
      padding: 0 0 20px 16px;
    }
    .tl-dot {
      position: absolute;
      left: -21px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
    }
    .tl-dot.done    { background: var(--green);  border-color: var(--green);  }
    .tl-dot.in-prog { background: var(--gold);   border-color: var(--gold);   }
    .tl-dot.overdue { background: var(--red);    border-color: var(--red);    }
    .tl-dot.pending { background: var(--bg);     border-color: var(--muted2); }
    .tl-date { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .tl-title { font-size: 13px; color: var(--text); }
    .tl-notes { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Stage bar ─────────────────────────────────────── */
    .stage-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
    }
    .stage-item {
      flex: 1;
      text-align: center;
    }
    .stage-dot-wrap {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .stage-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .stage-dot.active  { background: var(--gold); border-color: var(--gold); }
    .stage-dot.done    { background: var(--green); border-color: var(--green); }
    .stage-label {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stage-label.active { color: var(--gold); }

    /* ── Service cards ─────────────────────────────────── */
    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted2);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .service-card.active { border-left-color: var(--gold); }
    .service-name { font-size: 14px; font-weight: 500; flex: 1; }
    .service-status { font-size: 11px; color: var(--muted); }

    /* ── Golf ──────────────────────────────────────────── */
    .round-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }
    .round-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }
    .round-date { font-size: 13px; color: var(--text); font-weight: 500; }
    .round-course { font-size: 12px; color: var(--muted); }
    .round-score { margin-left: auto; font-family: 'Playfair Display', Georgia, serif; font-size: 18px; color: var(--gold); }
    .round-details { font-size: 11px; color: var(--muted2); }

    /* ── Document list ─────────────────────────────────── */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .doc-icon.submitted { background: var(--green); }
    .doc-icon.pending   { background: var(--amber); }
    .doc-icon.missing   { background: var(--red); }
    .doc-title { flex: 1; font-size: 13px; }
    .doc-meta  { font-size: 11px; color: var(--muted); }

    /* ── Upload form ───────────────────────────────────── */
    .upload-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      margin-top: 20px;
    }
    .upload-form h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 18px;
      color: var(--text);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%;
      background: #f5f0e8;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 3px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: var(--gold); }
    .form-field select option { background: var(--surface); }
    .btn-submit {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 3px;
      padding: 9px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #caa938; }
    .form-msg { margin-top: 12px; font-size: 12px; }
    .form-msg.ok    { color: var(--green); }
    .form-msg.error { color: #e74c3c; }

    /* ── Hero banner ───────────────────────────────────── */
    .hero-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }
    .hero-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .hero-sub { font-size: 12px; color: var(--muted); }
    .hero-fields { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; }
    .hero-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 3px; }
    .hero-field-value { font-size: 13px; color: var(--text); }

    /* ── Urgent strip ──────────────────────────────────── */
    .urgent-strip {
      background: rgba(192,57,43,.1);
      border: 1px solid rgba(192,57,43,.25);
      border-radius: 4px;
      padding: 14px 20px;
      margin-bottom: 20px;
    }
    .urgent-strip h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e74c3c;
      margin-bottom: 10px;
    }
    .urgent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      padding: 4px 0;
    }
    .urgent-days { color: #e74c3c; font-weight: 600; font-size: 12px; min-width: 60px; }
    .urgent-days.amber { color: var(--amber); }

    /* ── Profile grid ──────────────────────────────────── */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .profile-cell {
      background: var(--surface);
      padding: 14px 18px;
    }
    .profile-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 4px; }
    .profile-cell-value { font-size: 13px; color: var(--text); }

    /* ── Empty state ───────────────────────────────────── */
    .empty { color: var(--muted2); font-size: 13px; padding: 32px 0; text-align: center; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 640px) {
      #main { padding: 20px 16px; }
      #header { padding: 0 16px; }
      #tabnav { padding: 0 16px; }
      .tab-btn { padding: 12px 14px; font-size: 11px; }
      .hero-fields { gap: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .auth-card { padding: 32px 24px; }
    }
  
    /* ── Overview cockpit ──────────────────────────────── */
    .ov-rightnow {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 4px;
      padding: 26px 30px; margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 24px; flex-wrap: wrap;
    }
    .ov-rn-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .16em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .ov-rn-title { font-family: 'Playfair Display', serif; font-size: 1.2rem;
      color: var(--text); margin-bottom: 10px; line-height: 1.4; }
    .ov-rn-owner { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .ov-rn-right { text-align: center; flex-shrink: 0; }
    .ov-rn-days { font-family: 'Playfair Display', serif; font-size: 3rem;
      font-weight: 400; line-height: 1; }
    .ov-rn-days-lbl { font-size: 10px; color: var(--muted2); letter-spacing: .08em;
      text-transform: uppercase; margin-top: 2px; }
    .ov-rn-date { font-size: 12px; color: var(--muted); margin: 6px 0 8px; }
    .ov-owner-badge { font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 3px; letter-spacing: .06em; }
    .own-both { background: rgba(184,150,46,.15); color: var(--gold); }
    .own-satit { background: rgba(100,150,200,.15); color: #6dacca; }
    .own-parent { background: rgba(100,180,100,.15); color: #6dca8d; }
    .ov-status-board { display: grid; grid-template-columns: repeat(4,1fr);
      gap: 14px; margin-bottom: 28px; }
    .ov-sb-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 18px 20px; cursor: pointer;
      transition: border-color .2s; }
    .ov-sb-card:hover { border-color: var(--gold); }
    .ov-sb-alert { border-left: 3px solid var(--red); }
    .ov-sb-label { font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted2); margin-bottom: 6px; }
    .ov-sb-value { font-family: 'Playfair Display', serif; font-size: 1.1rem;
      color: var(--text); margin-bottom: 4px; }
    .ov-sb-sub { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .ov-sb-link { font-size: 11px; color: var(--gold); font-weight: 600; }
    .ov-wn-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
    .ov-wn-hdr { font-size: 10px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--gold); padding: 14px 20px;
      border-bottom: 1px solid var(--border); }
    .ov-wn-row { display: flex; align-items: center; gap: 14px; padding: 13px 20px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
    .ov-wn-row:last-child { border-bottom: none; }
    .ov-wn-row:hover { background: var(--surface2); }
    .ov-wn-body { flex: 1; }
    .ov-wn-lbl { font-size: 13px; color: var(--text); margin-bottom: 2px; }
    .ov-wn-src { font-size: 11px; color: var(--muted2); }
    .ov-wn-days { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }
    .stage-progress { background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 20px 24px; }
    .stage-steps { display: flex; gap: 0; margin-bottom: 16px; }
    .stage-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }

function $id(id) { return document.getElementById(id) }

function fmtDate(d) {
  if (!d) return '—'
  const dt = new Date(d)
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
}

function daysUntil(d) {
  if (!d) return null
  const diff = new Date(d) - new Date()
  return Math.ceil(diff / 86400000)
}

function statusBadge(s) {
  const map = {
    'complete': 'badge-green',
    'Complete': 'badge-green',
    'Completed': 'badge-green',
    'Done': 'badge-green',
    'approved': 'badge-green',
    'verified': 'badge-green',
    'Active': 'badge-gold',
    'reviewed': 'badge-gold',
    'upcoming': 'badge-amber',
    'in_progress': 'badge-amber',
    'In Progress': 'badge-amber',
    'Pending': 'badge-amber',
    'submitted': 'badge-amber',
    'overdue': 'badge-red',
    'Overdue': 'badge-red',
    'missing': 'badge-red',
    'expired': 'badge-red',
    'rejected': 'badge-red',
    'Not Started': 'badge-muted',
  }
  const cls = map[s] || 'badge-muted'
  return `<span class="badge ${cls}">${s || 'Unknown'}</span>`
}

function tlDotClass(status) {
  if (!status) return 'pending'
  const s = status.toLowerCase()
  if (s.includes('complete') || s.includes('done') || s.includes('verified')) return 'done'
  if (s.includes('progress') || s.includes('active')) return 'in-prog'
  if (s.includes('overdue')) return 'overdue'
  return 'pending'
}

// ── Auth ─────────────────────────────────────────────────────────────────────
async function signIn() {
  const email = $id('auth-email').value.trim()
  const btn = $id('auth-btn')
  const err = $id('auth-error')

  if (!email) {
    err.textContent = 'Please enter your email address.'
    err.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = 'Sending...'
  err.style.display = 'none'

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin }
  })

  if (error) {
    err.textContent = error.message
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Send me a login link'
  } else {
    $id('auth-sent-email').textContent = email
    $id('auth-form-wrap').style.display = 'none'
    $id('auth-sent-wrap').style.display = 'block'
  }
}

function toggleLang() {
  const isNowTH = !document.body.classList.contains('portal-lang-th')
  document.body.classList.toggle('portal-lang-th', isNowTH)
  $id('lang-btn').textContent = isNowTH ? 'ภาษาไทย | EN' : 'EN | ภาษาไทย'
  localStorage.setItem('portal_lang', isNowTH ? 'th' : 'en')
}

function resetAuthForm() {
  $id('auth-form-wrap').style.display = 'block'
  $id('auth-sent-wrap').style.display = 'none'
  $id('auth-btn').disabled = false
  $id('auth-btn').textContent = 'Send me a login link'
  $id('auth-error').style.display = 'none'
}

async function signOut() {
  await sb.auth.signOut()
  D = null
  golfRounds = []
  $id('app').classList.remove('visible')
  $id('app').style.display = 'none'
  resetAuthForm()
  $id('auth-email').value = ''
  $id('auth-screen').style.display = 'flex'
}

// ── Enter key on email field ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  $id('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') signIn()
  })
  // Restore language preference
  if (localStorage.getItem('portal_lang') === 'th') {
    document.body.classList.add('portal-lang-th')
    const btn = $id('lang-btn')
    if (btn) btn.textContent = 'ภาษาไทย | EN'
  }
})

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData(token) {
  window._token = token
  const res = await fetch('/api/student', {
    headers: { Authorization: `Bearer ${token}` }
  })
  if (!res.ok) throw new Error(`Student API error ${res.status}`)
  return res.json()
}

async function loadGolfRounds(token, studentId) {
  try {
    const res = await fetch(`/api/golf-rounds?student_id=${studentId}`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    if (res.ok) {
      const j = await res.json()
      return j.rounds || []
    }
  } catch (e) { /* non-fatal */ }
  return []
}

function urgColour(d) {
  if (d === null) return 'var(--muted)'
  if (d < 0)   return 'var(--red)'
  if (d < 30)  return 'var(--red)'
  if (d < 60)  return 'var(--amber)'
  return 'var(--green)'
}

function renderSchools() {
  const schools = D.schools || []

  // Pipeline stages
  const PIPELINE = ['Researching','Applied','Interview','Offer','Accepted']
  const statusToStage = { researching:0, applied:1, interview:2, offer:3, accepted:4, rejected:-1 }
  const priorityLabel = { high:'Primary Target', medium:'Supporting', reach:'Stretch', low:'Monitoring' }
  const priorityCls   = { high:'role-primary', medium:'role-support', reach:'role-stretch', low:'role-support' }
  const statusColour  = { researching:'var(--muted)', applied:'var(--amber)', interview:'var(--gold)', offer:'var(--green)', accepted:'var(--green)', rejected:'var(--red)' }

  const total = schools.length
  const applied = schools.filter(s => ['applied','interview','offer','accepted'].includes(s.application_status)).length
  const researching = schools.filter(s => s.application_status === 'researching').length
  const targetYear = D.student.targetEntryYear || '—'

  // Upcoming deadlines from real schools
  const upcoming = schools
    .filter(s => s.deadline && daysUntil(s.deadline) >= 0)
    .map(s => ({ school: s.school_name, date: s.deadline, days: daysUntil(s.deadline), label: 'Application Deadline' }))
    .sort((a,b) => a.days - b.days)
    .slice(0, 5)

  const urgRows = upcoming.map(e => {
    const col = urgColour(e.days)
    return `<div class="sa-urg-row">
      <div class="sa-urg-dot" style="background:${col}"></div>
      <span class="sa-urg-school">${e.school.split(' ')[0]}</span>

      <span class="sa-urg-days" style="color:${col}">${e.days}d</span>
    </div>`
  }).join('')

  const cards = schools.map(sc => {
    const stage = statusToStage[sc.application_status] ?? 0
    const pip = PIPELINE.map((label, i) => {
      const isDone = i < stage

    const fee = sc.annual_fee_gbp

    const deadline = sc.deadline ? `Deadline: ${fmtDate(sc.deadline)} (${daysUntil(sc.deadline)}d)` : ''

    return `<div class="sa-card">
      <div class="sa-card-head">
        <div>
          <div class="sa-card-name">${sc.school_name}</div>
          <div class="sa-card-meta">${sc.country||'UK'}</div>
          <div class="sa-card-fee">${feeStr}</div>

        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="sa-role ${priorityCls[sc.priority]||'role-support'}">${priorityLabel[sc.priority]||sc.priority}</span>
          <span class="sa-status" style="color:${statusColour[sc.application_status]||'var(--muted)'}">● ${sc.application_status.charAt(0).toUpperCase()+sc.application_status.slice(1)}</span>
        </div>
      </div>
      <div class="sa-pipeline">${pip}</div>
      <div class="sa-body">
        <div class="sa-col">
          <div class="sa-sec-lbl">Timeline</div>
          ${deadline ? `<div class="sa-ev-row"><div class="sa-ev-lbl">${deadline}</div></div>` : '<div style="font-size:12px;color:var(--muted)">No deadline set</div>'}

        <a href="https://line.me/R/ti/p/@linkedu" target="_blank" class="btn-sm btn-sm-primary">Ask Consultant</a>
      </div>
    </div>`
  }).join('')

  const html = `
    <div class="sa-summary">
      <div class="sa-sum-card"><div class="sa-sum-num">${total}</div><div class="sa-sum-lbl">Schools Tracked</div></div>
      <div class="sa-sum-card"><div class="sa-sum-num">${applied}</div><div class="sa-sum-lbl">Applied</div></div>
      <div class="sa-sum-card"><div class="sa-sum-num">${researching}</div><div class="sa-sum-lbl">Researching</div></div>
      <div class="sa-sum-card"><div class="sa-sum-num" style="color:var(--amber)">${targetYear}</div><div class="sa-sum-lbl">Target Entry</div></div>
    </div>
    ${upcoming.length ? `<div class="sa-urgency"><div class="sa-urg-hdr">Upcoming Deadlines</div>${urgRows}</div>` : ''}
    <div class="section-title">Application Tracker</div>
    ${cards || '<div class="empty">No schools on shortlist yet. Your consultant will add them here.</div>'}`

  $id('schools-content').innerHTML = html
}

// ── Profile completion calculator ─────────────────────────────────────────────
function computeCompletion(p) {
  const fields = [
    p.studentName, p.preferredName, p.dob, p.nationality,
    p.currentSchool, p.currentYearGroup, p.curriculum, p.englishLevel,
    p.goal, p.destination && p.destination.length ? p.destination[0] : null,
    p.budgetGBP, p.targetEntryYear, p.primarySport
  ]
  const filled = fields.filter(f => f !== null && f !== undefined && f !== '').length
  return { filled, total: fields.length, pct: Math.round(filled / fields.length * 100) }
}

// ── Edit / Save helpers ───────────────────────────────────────────────────────
function editSection(id) {
  document.getElementById('prof-read-' + id).style.display = 'none'
  document.getElementById('prof-edit-' + id).style.display = 'block'
}
function cancelSection(id) {
  document.getElementById('prof-read-' + id).style.display = 'block'
  document.getElementById('prof-edit-' + id).style.display = 'none'
}
async function saveSection(id, fields) {
  const msgEl = document.getElementById('prof-msg-' + id)
  const btn = document.getElementById('prof-savebtn-' + id)
  btn.disabled = true
  btn.textContent = 'Saving…'
  try {
    const { data: { session } } = await sb.auth.getSession()
    const res = await fetch('/api/update-student', {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(fields)
    })
    const json = await res.json()
    if (!res.ok) throw new Error(json.error || 'Save failed')
    // Update local D.student with saved values
    Object.assign(D.student, fields.student_name !== undefined ? {
      studentName: fields.student_name, preferredName: fields.preferred_name,
      dob: fields.dob, nationality: fields.nationality
    } : fields.current_school !== undefined ? {
      currentSchool: fields.current_school, currentYearGroup: fields.current_year_group,
      curriculum: fields.curriculum, englishLevel: fields.english_level
    } : fields.goal !== undefined ? {
      goal: fields.goal, destination: fields.destination ? fields.destination.split(',').map(s=>s.trim()).filter(Boolean) : D.student.destination,
      budgetGBP: fields.budget_gbp ? parseInt(fields.budget_gbp) : D.student.budgetGBP,
      targetEntryYear: fields.target_entry_year
    } : { primarySport: fields.primary_sport })
    cancelSection(id)
    msgEl.style.display = 'inline'
    setTimeout(() => { msgEl.style.display = 'none' }, 3000)
    // Update cache and re-render completion bar
    try { localStorage.setItem('portal_cache', JSON.stringify({ D, ts: Date.now() })) } catch(e) {}
    renderProfile()
  } catch(err) {
    btn.textContent = 'Error — try again'
    btn.style.color = 'var(--red)'
    console.error('saveSection error:', err)
  } finally {
    btn.disabled = false
    if (btn.textContent === 'Saving…') { btn.textContent = 'Save'; btn.style.color = '' }
  }
}

async function saveNotesField(dbField, studentField, value) {
  const { data: { session } } = await sb.auth.getSession()
  const res = await fetch('/api/update-student', {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ [dbField]: value })
  })
  const json = await res.json()
  if (!res.ok) throw new Error(json.error || 'Save failed')
  D.student[studentField] = value
  try { localStorage.setItem('portal_cache', JSON.stringify({ D, ts: Date.now() })) } catch(e) {}
}

function showNotesEdit(elId) {
  $id(elId+'-read').style.display = 'none'
  $id(elId+'-edit').style.display = 'block'
  const ta = $id(elId+'-ta'); if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length) }
}
function hideNotesEdit(elId) {
  $id(elId+'-read').style.display = ''
  $id(elId+'-edit').style.display = 'none'
}
async function submitNotesEdit(elId, dbField, studentField) {
  const ta  = $id(elId+'-ta')
  const msg = $id(elId+'-msg')
  const val = ta.value.trim()
  msg.textContent = 'Saving…'
  try {
    await saveNotesField(dbField, studentField, val)
    msg.textContent = '✓ Saved'
    setTimeout(() => { msg.textContent = ''; renderProfile() }, 1000)
  } catch(err) {
    msg.style.color = 'var(--red)'; msg.textContent = 'Error — try again'
  }
}

async function saveIntakeSection() {
  const btn   = document.getElementById('prof-savebtn-intake')
  const msgEl = document.getElementById('prof-msg-intake')
  btn.disabled = true; btn.textContent = 'Saving…'

  const services    = Array.from(document.querySelectorAll('input[name="pe-services"]:checked')).map(el => el.value)
  const schoolTypes = Array.from(document.querySelectorAll('input[name="pe-school-types"]:checked')).map(el => el.value)
  const courses     = Array.from(document.querySelectorAll('input[name="pe-courses"]:checked')).map(el => el.value)
  const heardFrom   = ($id('pe-heard') || {}).value || ''
  const referralNote = ($id('pe-referral') || {}).value || ''

  try {
    const { data: { session } } = await sb.auth.getSession()
    const res = await fetch('/api/update-student', {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        services_interested:    services,
        school_types_interested: schoolTypes,
        courses_interested:     courses,
        heard_from:             heardFrom,
        referral_note:          referralNote,
      })
    })
    const json = await res.json()
    if (!res.ok) throw new Error(json.error || 'Save failed')

    D.student.servicesInterested    = services
    D.student.schoolTypesInterested = schoolTypes
    D.student.coursesInterested     = courses
    D.student.heardFrom             = heardFrom
    D.student.referralNote          = referralNote

    cancelSection('intake')
    msgEl.style.display = 'inline'
    setTimeout(() => { msgEl.style.display = 'none' }, 3000)
    try { localStorage.setItem('portal_cache', JSON.stringify({ D, ts: Date.now() })) } catch(e) {}
    renderProfile()
  } catch(err) {
    btn.textContent = 'Error — try again'; btn.style.color = 'var(--red)'
    console.error('saveIntakeSection error:', err)
  } finally {
    btn.disabled = false
    if (btn.textContent === 'Saving…') { btn.textContent = 'Save'; btn.style.color = '' }
  }
}

// ── Recommendations ───────────────────────────────────────────────────────────
function renderRecommendations() {
  const recs    = D.recommendations || []
  const el      = $id('rec-content')
  const isAgent = !window.location.search.includes('view=parent')
  const s       = D.student || {}

  // Tier: derive from score if not set correctly (old algorithm set everything to strong_match)
  function calcTier(r) {
    const sc = r.score || 0
    if (sc >= 85) return 'strong_match'
    if (sc >= 70) return 'good_match'
    return 'consider'
  }
  const tierLabel = { strong_match: 'Strong Match', good_match: 'Good Match', consider: 'Consider' }
  const tierCls   = { strong_match: 'tier-target', good_match: 'tier-strong', consider: 'tier-consider' }

  const approved = isAgent ? recs.filter(r => r.approved)  : recs
  const pending  = isAgent ? recs.filter(r => !r.approved) : []

  // School details link using slug
  function schoolLink(r) {
    const slug = r.school_slug || r.school_name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')
    return `https://linkeduth.netlify.app/schools/${slug}.html`
  }

  // Rich reasons display — tags + consultant note paragraphs
  function reasonsList(r) {
    const tags     = r.match_reasons && r.match_reasons.length ? r.match_reasons : []
    const noteText = r.consultant_note || ''
    // Split consultant_note into sentences for bullets
    const notePts  = noteText.split(/\.\s+/).filter(s => s.trim().length > 10).map(s => s.trim().replace(/\.$/,''))
    // Build rich bullets from tags — expand generic tags into descriptive sentences
    const tagExpanded = tags.map(tag => {
      if (/fee|budget/i.test(tag))       return `Fee of £${r.fee ? Number(r.fee).toLocaleString() : '—'}/yr fits within the family's budget — no financial stretch required`
      if (/golf/i.test(tag))             return `Golf programme available — school offers structured golf coaching and competitive opportunities`
      if (/scholarship/i.test(tag))      return `Scholarship opportunities available — family should enquire about sport or academic scholarships to reduce fees`
      if (/boarding/i.test(tag))         return `Full boarding environment matches the family's preference for an immersive residential experience`
      if (/academic/i.test(tag))         return `Academic profile is appropriate for the student's current grade level and target entry requirements`
      if (/sport/i.test(tag))            return `Strong sports provision matches the student's active profile and interest in competitive sport`
      return tag
    })
    const bullets = [...tagExpanded, ...notePts]
    if (!bullets.length) return '<div style="font-size:12px;color:var(--muted);font-style:italic">Re-run AI Recs for detailed reasoning.</div>'
    return `
      <div class="rec-reasons-title">Why this school</div>
      <ul class="rec-reasons-list">${bullets.map(b => `<li>${b}</li>`).join('')}</ul>`
  }

  // Score badge
  function scoreBadge(r) {
    const sc   = r.score || 0
    const tier = calcTier(r)
    const col  = tier === 'strong_match' ? '#B8962E' : tier === 'good_match' ? '#27ae60' : '#888'
    return `
      <div style="text-align:right">
        <div style="font-size:28px;font-weight:700;color:${col};line-height:1">${sc}</div>
        <div style="font-size:10px;color:var(--muted);letter-spacing:.05em">/ 100 match score</div>
      </div>`
  }

  function recCard(r, buttons) {
    const tier = calcTier(r)
    return `
    <div class="rec-card" id="rec-${r.id}">
      <div class="rec-card-inner">
        <div class="rec-card-left">
          <div>
            <div class="rec-card-name">${r.school_name}</div>
            <div class="rec-card-sub">${[r.region, r.fee ? '£'+Number(r.fee).toLocaleString()+'/yr' : null, r.school_type].filter(Boolean).join(' · ')}</div>
          </div>
          <span class="rec-tier ${tierCls[tier]}">${tierLabel[tier]}</span>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:auto">
            ${buttons}
            <a href="${schoolLink(r)}" target="_blank" class="rec-btn rec-btn-link" style="text-decoration:none;display:block;text-align:center">View School →</a>
          </div>
        </div>
        <div class="rec-card-right">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div style="flex:1">${reasonsList(r)}</div>
            <div style="margin-left:20px;flex-shrink:0">${scoreBadge(r)}</div>
          </div>
        </div>
      </div>
    </div>`
  }

  // Student summary box for agent
  function studentSummary() {
    if (!isAgent) return ''
    const budget   = s.budgetGBP ? `£${Number(s.budgetGBP).toLocaleString()}/yr` : 'not set'
    const sport    = s.primarySport || 'not specified'
    const goal     = s.goal || 'not specified'
    const dest     = (s.destination || []).join(', ') || 'not set'
    const entry    = s.targetYearGroup ? `${s.targetYearGroup} (${s.targetEntryYear || ''})` : 'not set'
    const types    = (s.schoolTypesInterested || []).join(', ') || 'any'
    const english  = s.englishLevel || 'not recorded'
    const stage    = s.stage || ''
    return `
      <div style="background:rgba(184,150,46,.06);border:1px solid rgba(184,150,46,.25);border-radius:6px;padding:16px 20px;margin-bottom:20px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);margin-bottom:10px">Student Profile Summary</div>
        <div style="font-size:13px;color:var(--text);line-height:1.8">
          <strong>${s.studentName || 'Student'}</strong> is a ${s.nationality || 'Thai'} student currently in
          <strong>${s.currentYearGroup || '—'}</strong> at ${s.currentSchool || '—'} (${s.curriculum || 'IGCSE'}).
          They are looking for <strong>${types}</strong> in <strong>${dest}</strong> for
          <strong>${entry}</strong> entry, with a budget of <strong>${budget}</strong>.
          Primary sport: <strong>${sport}</strong>. English level: <strong>${english}</strong>.
          ${goal ? `<br>Goal: <em>${goal}</em>` : ''}
          ${stage ? `<br>Current stage: <strong>${stage}</strong>.` : ''}
        </div>
      </div>`
  }

  const agentToolbar = isAgent ? `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text)">School Recommendations</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">Approve what parents see · Delete unwanted · Move to Applying when ready</div>
      </div>
      <button id="run-recs-btn" onclick="runRecs()" class="rec-btn rec-btn-dark" style="white-space:nowrap;padding:8px 16px">↻ Re-run Recommendations</button>
    </div>
    ${studentSummary()}
    <div class="rec-search-row">
      <input id="rec-search-input" class="rec-search-input" placeholder="Search and add a school by name..." list="rec-school-list" autocomplete="off"/>
      <datalist id="rec-school-list"></datalist>
      <button onclick="addSchoolManually()" class="rec-btn rec-btn-gold" style="width:auto;padding:9px 18px;white-space:nowrap">+ Add School</button>
    </div>` : ''

  const parentHeader = !isAgent ? `
    <div class="rec-hdr" style="margin-bottom:20px">
      <div class="rec-hdr-title">School Recommendations</div>
      <div class="rec-hdr-note">Personally reviewed and selected by your consultant based on your child's profile, budget, sport, and goals.</div>
    </div>` : ''

  if (!recs.length && !isAgent) {
    el.innerHTML = `<div class="rec-section">${parentHeader}<div style="text-align:center;padding:60px 20px"><div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">No recommendations yet</div><div style="font-size:13px;color:var(--muted)">Your consultant will send personalised recommendations shortly.</div></div></div>`
    return
  }

  let html = `<div class="rec-section">${agentToolbar}${parentHeader}`

  if (approved.length) {
    if (isAgent) html += `<p class="rec-section-label">Approved — Visible to Parents (${approved.length})</p>`
    html += approved.map(r => recCard(r, isAgent ? `
      <button onclick="moveToApplying('${r.id}')" class="rec-btn rec-btn-dark" style="color:#fff">Move to Applying</button>
      <button onclick="deleteRec('${r.id}')" class="rec-btn rec-btn-danger">Remove</button>` : '')).join('')
  }

  if (isAgent && pending.length) {
    if (approved.length) html += `<hr class="rec-divider">`
    html += `<p class="rec-section-label">Pending Review (${pending.length})</p>`
    html += pending.map(r => recCard(r, `
      <button onclick="approveRec('${r.id}')" class="rec-btn rec-btn-gold">Show to Parent</button>
      <button onclick="deleteRec('${r.id}')" class="rec-btn rec-btn-danger">Delete</button>`)).join('')
  }

  if (isAgent && !recs.length) {
    html += `<div style="text-align:center;padding:40px 20px"><div style="font-size:14px;color:var(--muted)">No recommendations yet. Add a school manually above.</div></div>`
  }

  html += `</div>`
  el.innerHTML = html
  if (isAgent) loadSchoolDatalist()
}

async function approveRec(id) {
  const card = document.querySelector(`#rec-${id}`)
  const btns = card ? card.querySelectorAll('button') : []
  btns.forEach(b => b.disabled = true)
  try {
    const res = await fetch('/api/approve-recommendations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': 'linkedu-admin-2026' },
      body: JSON.stringify({ student_id: D.student.id, approvals: [{ school_id: id, approved: true, consultant_note: null }] })
    })
    if (!res.ok) throw new Error(await res.text())
    const rec = (D.recommendations || []).find(r => r.id === id)
    if (rec) rec.approved = true
    renderRecommendations()
  } catch(e) { btns.forEach(b => b.disabled = false); alert('Error: ' + e.message) }
}

async function deleteRec(id) {
  if (!confirm('Remove this recommendation?')) return
  try {
    const res = await fetch('/api/delete-recommendation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': 'linkedu-admin-2026' },
      body: JSON.stringify({ id })
    })
    if (!res.ok) throw new Error(await res.text())
    D.recommendations = (D.recommendations || []).filter(r => r.id !== id)
    renderRecommendations()
  } catch(e) { alert('Error: ' + e.message) }
}

async function moveToApplying(rec_id) {
  const btn = document.querySelector(`#rec-${rec_id} .rec-btn-dark`)
  if (btn) { btn.textContent = 'Moving...'; btn.disabled = true }
  try {
    const res = await fetch('/api/move-to-applying', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': 'linkedu-admin-2026' },
      body: JSON.stringify({ rec_id })
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Failed')
    if (btn) { btn.textContent = 'Added to Schools ✓'; btn.style.background = '#2d6a2d'; btn.style.color = '#fff' }
  } catch(e) {
    if (btn) { btn.textContent = 'Move to Applying'; btn.disabled = false }
    alert(e.message === 'Already in applying list' ? 'Already in the Schools tab.' : 'Error: ' + e.message)
  }
}

async function runRecs() {
  const btn = $id('run-recs-btn')
  if (!btn) return
  btn.textContent = 'Running...'
  btn.disabled = true
  try {
    const res = await fetch('/api/generate-recommendations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': 'linkedu-admin-2026' },
      body: JSON.stringify({ student_id: D.student.id })
    })
    const data = await res.json()
    if (data.error) { alert('Error: ' + data.error); return }

    // Reload recommendations from Supabase and re-render
    const reload = await fetch('/api/student', { headers: { 'Authorization': 'Bearer ' + window._token } })
    const fresh = await reload.json()
    D.recommendations = fresh.recommendations || []
    renderRecommendations()
    btn.textContent = `↻ Re-run Recommendations`
  } catch(e) {
    alert('Error: ' + e.message)
  } finally {
    btn.disabled = false
  }
}

// Load school names from schools.json into datalist for search
async function loadSchoolDatalist() {
  try {
    const res  = await fetch('/data/schools.json')
    const list = await res.json()
    const dl   = $id('rec-school-list')
    if (dl) dl.innerHTML = list.map(s => `<option value="${s.name}">`).join('')
  } catch(e) { /* silent — datalist is a nice-to-have */ }
}

async function addSchoolManually() {
  const input = $id('rec-search-input')
  const name  = (input ? input.value : '').trim()
  if (!name) { alert('Please enter a school name.'); return }
  const btn = document.querySelector('.rec-search-row .rec-btn-gold')
  if (btn) { btn.textContent = 'Adding...'; btn.disabled = true }
  try {
    const res = await fetch('/api/add-recommendation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': 'linkedu-admin-2026' },
      body: JSON.stringify({ student_id: D.student.id, school_name: name, consultant_note: '', tier: 'consider' })
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Failed')
    if (input) input.value = ''
    if (btn) { btn.textContent = '+ Add School'; btn.disabled = false }
    // Reload recommendations
    const reload = await fetch('/api/student', { headers: { 'Authorization': `Bearer ${window._token}` } })
    const fresh  = await reload.json()
    D.recommendations = fresh.recommendations || D.recommendations
    renderRecommendations()
  } catch(e) {
    if (btn) { btn.textContent = '+ Add School'; btn.disabled = false }
    alert('Error: ' + e.message)
  }
}

// ── Golf Storage (computeRoundStats inline) ────────────────────────────────
const GolfStorage = (() => {
  function computeRoundStats(round) {
    const holes = round.holes || [];
    const totalScore  = holes.reduce((s, h) => s + (h.score || 0), 0);
    const totalPar    = holes.reduce((s, h) => s + (h.par   || 4), 0);
    const scoreToPar  = totalScore - totalPar;
    const totalPutts  = holes.reduce((s, h) => s + (h.putts || 0), 0);
    let fairwaysHit = 0, fairwaysApplicable = 0;
    holes.forEach(h => {
      if ((h.par || 4) >= 4) {
        fairwaysApplicable++;
        const teeShot = (h.shots || [])[0];
        if (teeShot && teeShot.result === 'Fairway') fairwaysHit++;
      }
    });
    let greensInRegulation = 0;
    holes.forEach(h => {
      const par = h.par || 4, putts = h.putts || 0, score = h.score || 0;
      if (score > 0 && putts >= 0 && (score - putts) <= (par - 2)) greensInRegulation++;
    });
    const front9Score = holes.slice(0,9).reduce((s,h)=>s+(h.score||0),0);
    const back9Score  = holes.slice(9,18).reduce((s,h)=>s+(h.score||0),0);
    const mentalRatings = holes.map(h => h.mentalRating || 1);
    const mentalRatingAvg = mentalRatings.length
      ? Math.round(10 * mentalRatings.reduce((a,b)=>a+b,0)/mentalRatings.length)/10 : 1;
    const clubsUsed = {};
    let pure = 0, ok = 0, mishit = 0;
    holes.forEach(h => {
      (h.shots || []).forEach(s => {
        clubsUsed[s.club] = (clubsUsed[s.club] || 0) + 1;
        if      (s.quality === 'Pure')   pure++;
        else if (s.quality === 'OK')     ok++;
        else if (s.quality === 'Mishit') mishit++;
      });
    });
    const teeClubBreakdown = {};
    holes.forEach(h => {
      if ((h.par || 4) >= 4) {
        const teeShot = (h.shots || [])[0];
        if (teeShot && teeShot.club && teeShot.club !== 'Putter') {
          const c = teeShot.club;
          if (!teeClubBreakdown[c]) teeClubBreakdown[c] = { attempts:0, fairways:0 };
          teeClubBreakdown[c].attempts++;
          if (teeShot.result === 'Fairway') teeClubBreakdown[c].fairways++;
        }
      }
    });
    const approachClubBreakdown = {};
    holes.forEach(h => {
      const par=h.par||4, putts=h.putts||0, score=h.score||0;
      if (score>0 && (score-putts)<=(par-2)) {
        const shots=(h.shots||[]).slice().reverse();
        const approach=shots.find(s=>s.club&&s.club!=='Putter');
        if (approach) approachClubBreakdown[approach.club]=(approachClubBreakdown[approach.club]||0)+1;
      }
    });
    return { totalScore, scoreToPar, totalPutts, fairwaysHit, fairwaysApplicable,
      greensInRegulation, front9Score, back9Score, mentalRatingAvg,
      mentalByHole:mentalRatings, clubsUsed, qualityBreakdown:{pure,ok,mishit},
      teeClubBreakdown, approachClubBreakdown };
  }
  return { computeRoundStats };
})();

window.initGolfTab = function(studentId, studentName) {
  injectGolfCSS();

};

window.golfSubTab = function(id) {
  document.querySelectorAll('.golf-sub-btn').forEach((b,i) => {
    b.classList.toggle('active', ['history','compare'][i] === id);
  });
  document.getElementById('golf-panel-history').classList.toggle('active', id==='history');
  document.getElementById('golf-panel-compare').classList.toggle('active', id==='compare');
  if (id==='compare') renderCompare();
};

function fmtDateGolf(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
}
function stpStr(n) { return n===0?'E':n>0?'+'+n:''+n; }
function stpClass(n) { return n<=-1?'under':n===0?'even':'over'; }
function mentalEmoji(m) { return m<=1.5?'😊':m<=2.5?'😐':'😤'; }
function fmtTeeClubs(bd) {
  if (!bd||!Object.keys(bd).length) return '';
  return Object.entries(bd).sort((a,b)=>b[1].attempts-a[1].attempts)
    .map(([c,d])=>`${c}: ${d.fairways}/${d.attempts}`).join(' · ');
}
function fmtApproachClubs(bd) {
  if (!bd||!Object.keys(bd).length) return '';
  return Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,4)
    .map(([c,n])=>`${c} ×${n}`).join(' · ');
}

function normalizeRound(r) {
  // Normalize Supabase column names → golf_tab.py format
  const holes = (r.holes || []).map(h => ({
    holeNumber:   h.holeNumber || h.hole_number || h.hole || 0,
    par:          h.par || 4,
    score:        h.score || h.strokes || 0,
    putts:        h.putts || 0,
    mentalRating: h.mentalRating || h.mental_rating || 1,
    shots:        h.shots || [],
    noteText:     h.noteText || h.note_text || '',
    noteAudioUrl: h.noteAudioUrl || h.note_audio_url || null,
    media:        h.media || [],
  }));
  return {
    roundId:            r.roundId || r.id,
    id:                 r.id,
    date:               r.date,
    course:             r.course,
    tees:               r.tees,
    roundType:          r.roundType || r.round_type,
    weather:            r.weather,
    conditions:         r.conditions,
    coachRecommendation: r.coachRecommendation || r.coach_recommendation,
    debriefNotes:       r.debriefNotes || r.debrief,
    roundAudioUrl:      r.roundAudioUrl || r.round_voice_memo,
    holes,
  };
}

async function fetchRounds(studentId) {
  // Use pre-loaded golf rounds from D if available
  if (golfRounds && golfRounds.length) return golfRounds.map(normalizeRound);
  try {
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) return [];
    const res = await fetch(`/api/golf-rounds?student_id=${encodeURIComponent(studentId)}`, {
      headers: { Authorization: `Bearer ${session.access_token}` }
    });
    if (!res.ok) return [];
    const json = await res.json();
    const raw = json.rounds || json || [];
    return raw.map(normalizeRound);
  } catch(e) { return []; }
}

window.renderList = async function(studentId) {
  const sid = studentId || (D&&D.student&&D.student.id);
  if (!sid) return;
  const listEl   = document.getElementById('golf-history-list');
  const detailEl = document.getElementById('golf-detail');
  if (!listEl) return;
  listEl.style.display = '';
  detailEl.style.display = 'none';
  listEl.innerHTML = '<div style="color:#aaa;padding:20px;text-align:center;font-size:13px">Loading rounds…</div>';
  cachedRounds = await fetchRounds(sid);
  const rounds = cachedRounds;

  if (!rounds.length) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⛳</div>
      <div class="empty-title"><span class="lang-en">No rounds recorded yet</span><span class="lang-th">ยังไม่มีข้อมูลการเล่น</span></div>
      <div class="empty-sub"><span class="lang-en">Rounds tracked by your LINKEDU Golf analyst will appear here after each session.</span><span class="lang-th">รายงานการเล่นจากนักวิเคราะห์ LINKEDU Golf จะปรากฏที่นี่หลังแต่ละรอบ</span></div>
    </div>`;
    return;
  }

  const rows = rounds.map(r => {
    const comp = r.computed || GolfStorage.computeRoundStats(r);
    const stp  = comp.scoreToPar;
    const cls  = stpClass(stp);
    const mental = mentalEmoji(comp.mentalRatingAvg);
    const rid = r.roundId || r.id;
    return `<div class="round-row" onclick="renderDetail('${rid}')">
      <div class="round-row-left">
        <div class="round-date">${fmtDateGolf(r.date)}</div>
        <div class="round-course">${r.course||'—'}</div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center">
          <span class="round-type-badge">${r.roundType||r.round_type||''}</span>
          <span style="font-size:11px;color:#aaa">${r.tees||''} ${r.conditions||''}</span>
        </div>
      </div>
      <div class="round-row-right">
        <div class="round-score ${cls}">${comp.totalScore} <span style="font-size:12px;opacity:0.7">(${stpStr(stp)})</span></div>
        <div class="round-meta">${comp.totalPutts} putts · ${mental}</div>
      </div>
    </div>`;
  }).join('');

  listEl.innerHTML = `<div class="card" style="padding:0 16px">${rows}</div>`;
  renderProgressCharts(rounds);
};

function renderProgressCharts(rounds) {
  const listEl = document.getElementById('golf-history-list');
  if (!listEl || rounds.length < 3) return;
  const last10 = rounds.slice(0,10).reverse();
  const labels = last10.map(r=>fmtDateGolf(r.date).slice(0,6));
  const comps  = last10.map(r=>r.computed||GolfStorage.computeRoundStats(r));
  const scores = comps.map(c=>c.totalScore);
  const putts  = comps.map(c=>c.totalPutts);
  const girs   = comps.map(c=>c.greensInRegulation);
  const mentals= comps.map(c=>+(c.mentalRatingAvg).toFixed(1));
  const chartsHtml = `
    <p class="sec-label" style="margin-top:32px">
      <span class="lang-en">Progress Over Time</span><span class="lang-th">พัฒนาการในระยะยาว</span>
    </p>
    <div class="chart-wrap-golf"><div class="chart-title">Scoring Average</div><canvas id="gc-score" height="80"></canvas></div>
    <div class="chart-wrap-golf"><div class="chart-title">Putts Per Round</div><canvas id="gc-putts" height="80"></canvas></div>
    <div class="chart-wrap-golf"><div class="chart-title">Greens in Regulation</div><canvas id="gc-gir" height="80"></canvas></div>
    <div class="chart-wrap-golf"><div class="chart-title">Mental Rating (1=Composed · 3=Struggled)</div><canvas id="gc-mental" height="80"></canvas></div>
    <div class="mental-note">
      <span class="lang-en">These charts show long-term trends, not judgements from any single round.</span>
      <span class="lang-th">กราฟเหล่านี้แสดงแนวโน้มในระยะยาว ไม่ใช่การตัดสินจากรอบใดรอบหนึ่ง</span>
    </div>`;
  listEl.insertAdjacentHTML('beforeend', chartsHtml);
  setTimeout(() => {
    if (!window.Chart) return;
    [{id:'gc-score',data:scores,color:'#B8962E'},
     {id:'gc-putts',data:putts,color:'#5a7aba'},
     {id:'gc-gir',data:girs,color:'#5a9a5a'},
     {id:'gc-mental',data:mentals,color:'#ca6d6d',min:1,max:3}
    ].forEach(cd => {
      const ctx = document.getElementById(cd.id);
      if (!ctx) return;
      const existing = Chart.getChart(ctx);
      if (existing) existing.destroy();
      new Chart(ctx, {
        type:'line',
        data:{labels,datasets:[{data:cd.data,borderColor:cd.color,backgroundColor:cd.color+'22',
          borderWidth:2,pointBackgroundColor:cd.color,pointRadius:4,fill:true,tension:0.3}]},
        options:{plugins:{legend:{display:false}},
          scales:{
            y:{min:cd.min,max:cd.max,ticks:{font:{size:11},color:'#aaa'},grid:{color:'#f0ebe2'}},
            x:{ticks:{font:{size:10},color:'#aaa'},grid:{display:false}}
          }
        }
      });
    });
  }, 100);
}

window.renderDetail = function(roundId) {

        <span class="pill pill-light">Score: ${comp.totalScore} (${stpStr(stp)})</span>

  const tilesHtml = `

    <div class="stat-tiles-grid">

        <div class="stat-tile-val ${stp<=0?'gold':''}">${stpStr(stp)}</div>
        <div class="stat-tile-note"><span class="lang-en">Score to par shows how your child performed relative to the course standard.</span><span class="lang-th">คะแนนเทียบกับพาร์บอกให้รู้ว่าลูกเล่นได้ดีแค่ไหน</span></div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile-label"><span class="lang-en">Fairways Hit</span><span class="lang-th">แฟร์เวย์</span></div>
        <div class="stat-tile-val">${comp.fairwaysHit}/${comp.fairwaysApplicable}</div>
        <div class="stat-tile-note">
          ${fmtTeeClubs(comp.teeClubBreakdown)?`<div style="font-size:11px;color:#B8962E;font-weight:600;margin-bottom:6px">${fmtTeeClubs(comp.teeClubBreakdown)}</div>`:''}
          <span class="lang-en">Fairways hit per club off the tee.</span><span class="lang-th">แฟร์เวย์ที่ตีได้แยกตามไม้</span>
        </div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile-label"><span class="lang-en">Greens in Reg.</span><span class="lang-th">GIR</span></div>
        <div class="stat-tile-val">${comp.greensInRegulation}/18</div>
        <div class="stat-tile-note">
          ${fmtApproachClubs(comp.approachClubBreakdown)?`<div style="font-size:11px;color:#B8962E;font-weight:600;margin-bottom:6px">Approach: ${fmtApproachClubs(comp.approachClubBreakdown)}</div>`:''}
          <span class="lang-en">Greens reached in regulation with approach clubs used.</span><span class="lang-th">จำนวนกรีนที่เข้าถึงตามกำหนด</span>
        </div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile-label"><span class="lang-en">Total Putts</span><span class="lang-th">พัตต์รวม</span></div>
        <div class="stat-tile-val">${comp.totalPutts}</div>
        <div class="stat-tile-note"><span class="lang-en">Total putts reflect green performance. Good benchmark: 30–36 putts per round.</span><span class="lang-th">จำนวนพัตต์รวมบอกถึงทักษะบนกรีน</span></div>
      </div>
    </div>`;

  const mentalRow = (round.holes||[]).map((h,i) => {
    const emoji = h.mentalRating===3?'😤':h.mentalRating===2?'😐':'😊';
    return `<div class="mental-cell"><div class="mental-emoji">${emoji}</div><div class="mental-hole-num">${i+1}</div></div>`;
  }).join('');
  const mentalHtml = `
    <p class="sec-label"><span class="lang-en">Mental Game</span><span class="lang-th">จิตใจในการเล่น</span></p>
    <div class="card" style="padding:16px">

function computeCourseStats(rounds) {
  const byC={};
  rounds.forEach(r=>{
    const c=r.course||'Unknown';
    if (!byC[c]) byC[c]={course:c,rounds:[],scoreToPars:[],putts:[],girs:[]};
    const comp=r.computed||GolfStorage.computeRoundStats(r);
    byC[c].rounds.push(r); byC[c].scoreToPars.push(comp.scoreToPar);
    byC[c].putts.push(comp.totalPutts); byC[c].girs.push(comp.greensInRegulation);
  });
  return Object.values(byC).map(d=>{
    const avg=arr=>arr.length?Math.round(10*arr.reduce((a,b)=>a+b,0)/arr.length)/10:null;
    return {course:d.course,roundCount:d.rounds.length,avgScoreToPar:avg(d.scoreToPars),
      avgPutts:avg(d.putts),avgGIR:avg(d.girs),rounds:d.rounds};
  }).sort((a,b)=>b.roundCount-a.roundCount);
}

async function renderCompare() {
  const el=document.getElementById('golf-compare-content');
  if (!cachedRounds.length) cachedRounds=await fetchRounds(D&&D.student&&D.student.id);
  const courseStats=computeCourseStats(cachedRounds);
  if (!courseStats.length) {
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🏌️</div><div class="empty-title"><span class="lang-en">No course data yet</span><span class="lang-th">ยังไม่มีข้อมูลสนาม</span></div></div>`;
    return;
  }
  const bestAvg=Math.min(...courseStats.filter(c=>c.avgScoreToPar!==null).map(c=>c.avgScoreToPar));
  const bestCourse=courseStats.find(c=>c.avgScoreToPar===bestAvg);
  const mostPlayed=courseStats[0];
  const rows=courseStats.map(cs=>{
    const isBest=bestCourse&&cs.course===bestCourse.course;
    const isMost=cs.course===mostPlayed.course;
    const stpAvg=cs.avgScoreToPar!==null?stpStr(Math.round(cs.avgScoreToPar)):'—';
    return `<tr><td style="font-weight:600">${cs.course}${isBest?'<span class="best-badge">Best Score</span>':''}${isMost?'<span class="most-played-badge">Most Played</span>':''}</td><td style="text-align:center">${cs.roundCount}</td><td style="text-align:center;font-weight:600;color:${cs.avgScoreToPar<=0?'#5a9a5a':'#1a1a1a'}">${stpAvg}</td><td style="text-align:center">${cs.avgPutts!==null?cs.avgPutts.toFixed(1):'—'}</td><td style="text-align:center">${cs.avgGIR!==null?cs.avgGIR.toFixed(1):'—'}</td></tr>`;

// Holds last extracted data for confirm step
let _lastExtracted = null
let _lastDocName = ''
let _lastFileHash = ''

async function hashFile(base64) {
  const binary = atob(base64)
  const bytes = new Uint8Array(binary.length)
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i)
  const hashBuf = await crypto.subtle.digest('SHA-256', bytes)
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('')
}

async function uploadAndExtract() {
  const input   = $id('report-file-input')
  const nameIn  = $id('doc-name-input')
  const btn     = $id('extract-btn')
  const msg     = $id('extract-msg')
  const preview = $id('extract-preview')

  if (!input || !input.files || !input.files[0]) {
    msg.className = 'form-msg error'; msg.textContent = 'Please select a PDF file first.'; return
  }

  const file = input.files[0]
  if (file.type !== 'application/pdf') {
    msg.className = 'form-msg error'; msg.textContent = 'Only PDF files are supported.'; return
  }
  if (file.size > 3_000_000) {
    msg.className = 'form-msg error'; msg.textContent = 'File too large. Please keep documents under 3MB.'; return
  }

  // Use typed name or fall back to filename (strip extension)
  _lastDocName = (nameIn && nameIn.value.trim()) || file.name.replace(/\.pdf$/i, '')

  btn.disabled = true; btn.textContent = 'Extracting…'
  msg.className = 'form-msg'; msg.textContent = 'Reading document with AI — this takes about 10 seconds…'
  preview.style.display = 'none'
  _lastExtracted = null
  _lastFileHash = ''

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader()
      reader.onload = () => resolve(reader.result.split(',')[1])
      reader.onerror = reject
      reader.readAsDataURL(file)
    })

    // Hash the file for duplicate detection
    _lastFileHash = await hashFile(base64)

    const { data: { session } } = await sb.auth.getSession()
    if (!session) { msg.className='form-msg error'; msg.textContent='Not logged in.'; return }

    const res = await fetch('/api/parse-report', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pdfBase64: base64, fileName: file.name, fileHash: _lastFileHash })
    })
    const json = await res.json()

    // Handle duplicate
    if (res.status === 409) {
      msg.className = 'form-msg error'
      msg.textContent = json.message || 'This document has already been uploaded.'
      btn.disabled = false; btn.textContent = 'Extract from Document'
      return
    }

    if (!res.ok) throw new Error(json.error || 'Extraction failed')

    const e = json.extracted
    _lastExtracted = e

    // Show document info found
    const profileLines = []
    if (e.docType)      profileLines.push(`<b>Document type:</b> ${e.docType.replace(/_/g,' ')}`)
    if (e.studentName)  profileLines.push(`<b>Name:</b> ${e.studentName}`)
    if (e.dob)          profileLines.push(`<b>Date of birth:</b> ${e.dob}`)
    if (e.school)       profileLines.push(`<b>School:</b> ${e.school}`)
    if (e.yearGroup)    profileLines.push(`<b>Year group:</b> ${e.yearGroup}`)
    if (e.curriculum)   profileLines.push(`<b>Curriculum:</b> ${e.curriculum}`)
    if (e.term)         profileLines.push(`<b>Term:</b> ${e.term}`)
    if (e.academicYear) profileLines.push(`<b>Academic year:</b> ${e.academicYear}`)

    $id('extract-profile-preview').innerHTML = profileLines.length
      ? profileLines.join('<br>')
      : '<span style="color:var(--muted)">No document info found</span>'

    // Show grades table
    const grades = e.grades || []
    const gradesSection = $id('extract-grades-section')
    if (grades.length) {
      const rows = grades.map(g => `
        <tr>
          <td style="padding:4px 8px;border-bottom:1px solid var(--border)">${g.subject}</td>
          <td style="padding:4px 8px;border-bottom:1px solid var(--border);text-align:center">${g.grade || '—'}</td>
          <td style="padding:4px 8px;border-bottom:1px solid var(--border);text-align:center">${g.score !== null && g.score !== undefined ? g.score : '—'}${g.maxScore ? '/'+g.maxScore : ''}</td>
        </tr>`).join('')
      $id('extract-grades-preview').innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:var(--surface3)">
            <th style="padding:6px 8px;text-align:left;font-weight:500">Subject</th>
            <th style="padding:6px 8px;text-align:center;font-weight:500">Grade</th>
            <th style="padding:6px 8px;text-align:center;font-weight:500">Score</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`
      gradesSection.style.display = 'block'
    } else {
      gradesSection.style.display = 'none'
    }

    // Show certifications
    const certs = e.certifications || []
    const certsSection = $id('extract-certs-section')
    if (certs.length) {
      const certRows = certs.map(c => `
        <div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
          <div style="font-weight:500;color:var(--text)">${c.name}</div>
          <div style="color:var(--muted);margin-top:2px">
            ${c.issuer ? c.issuer + (c.presenter || c.score || c.grade || c.date ? ' · ' : '') : ''}${c.presenter ? 'Presented by ' + c.presenter + (c.score || c.grade || c.date ? ' · ' : '') : ''}${c.score || c.grade || ''}${c.date ? ' · ' + c.date : ''}
          </div>
        </div>`).join('')
      $id('extract-certs-preview').innerHTML = certRows
      certsSection.style.display = 'block'
    } else {
      certsSection.style.display = 'none'
    }

    preview.style.display = 'block'
    const summary = [
      grades.length ? `${grades.length} grade${grades.length!==1?'s':''}` : '',
      certs.length  ? `${certs.length} certificate${certs.length!==1?'s':''}` : '',
    ].filter(Boolean).join(', ')
    msg.className = 'form-msg ok'
    msg.textContent = (summary ? `Found ${summary}` : 'Document read') + ' — review below and confirm to save.'

  } catch (err) {
    msg.className = 'form-msg error'; msg.textContent = err.message || 'Extraction failed.'
    console.error('uploadAndExtract error:', err)
  } finally {
    btn.disabled = false; btn.textContent = 'Extract from Document'
  }
}

function cancelExtract() {
  $id('extract-preview').style.display = 'none'
  $id('extract-msg').textContent = ''
  _lastExtracted = null
  _lastDocName = ''
  _lastFileHash = ''
}

async function confirmExtracted() {
  if (!_lastExtracted) return
  const btn = $id('confirm-extract-btn')
  const msg = $id('confirm-msg')
  btn.disabled = true; btn.textContent = 'Saving…'
  msg.className = 'form-msg'; msg.textContent = ''

  try {
    const { data: { session } } = await sb.auth.getSession()
    const e = _lastExtracted

    // Build profile updates (only fill empty fields)
    const profileUpdates = {}
    if (e.studentName && !D.student.studentName)          profileUpdates.student_name        = e.studentName
    if (e.dob         && !D.student.dob)                  profileUpdates.dob                 = e.dob
    if (e.school      && !D.student.currentSchool)        profileUpdates.current_school      = e.school
    if (e.yearGroup   && !D.student.currentYearGroup)     profileUpdates.current_year_group  = e.yearGroup
    if (e.curriculum  && !D.student.curriculum)           profileUpdates.curriculum          = e.curriculum

    const res = await fetch('/api/save-academics', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        grades:         e.grades || [],
        certifications: e.certifications || [],
        term:           e.term,
        academicYear:   e.academicYear,
        profileUpdates,
        docName:        _lastDocName || 'Uploaded document',
        docType:        e.docType || 'other',
        rawJson:        e,
        fileHash:       _lastFileHash || null,
      })
    })
    const json = await res.json()
    if (!res.ok) throw new Error(json.error || 'Save failed')

    // Update local D.student with any profile fills
    if (profileUpdates.student_name)        D.student.studentName       = profileUpdates.student_name
    if (profileUpdates.dob)                 D.student.dob               = profileUpdates.dob
    if (profileUpdates.current_school)      D.student.currentSchool     = profileUpdates.current_school
    if (profileUpdates.current_year_group)  D.student.currentYearGroup  = profileUpdates.current_year_group
    if (profileUpdates.curriculum)          D.student.curriculum        = profileUpdates.curriculum

    // Refresh all data from server (academics, certifications, extractions)
    const refreshRes = await fetch('/api/student', { headers: { Authorization: `Bearer ${session.access_token}` } })
    if (refreshRes.ok) {
      const fresh = await refreshRes.json()
      D.academics      = fresh.academics      || D.academics
      D.certifications = fresh.certifications || D.certifications || []
      D.extractions    = fresh.extractions    || D.extractions    || []
      try { localStorage.setItem('portal_cache', JSON.stringify({ D, ts: Date.now() })) } catch(e) {}
    }

    const gs = json.gradesSaved || 0
    const cs = json.certsSaved  || 0
    const parts = [
      gs > 0 ? `${gs} grade${gs!==1?'s':''}` : '',
      cs > 0 ? `${cs} certificate${cs!==1?'s':''}` : '',
    ].filter(Boolean).join(' and ')

    msg.className = 'form-msg ok'
    msg.textContent = `Saved ${parts || 'document info'} successfully!`
    _lastExtracted = null
    _lastDocName = ''
    $id('extract-preview').style.display = 'none'
    $id('extract-msg').className = 'form-msg ok'
    $id('extract-msg').textContent = parts ? `${parts} saved.` : 'Document info saved.'

    // Re-render profile and documents
    renderProfile()
    renderDocuments()

  } catch (err) {
    msg.className = 'form-msg error'; msg.textContent = err.message || 'Save failed.'
    console.error('confirmExtracted error:', err)
  } finally {
    btn.disabled = false; btn.textContent = 'Save to Profile'
  }
}

async function submitDoc() {
  const title = $id('doc-title').value.trim()
  const type  = $id('doc-type').value
  const link  = $id('doc-link').value.trim()
  const notes = $id('doc-notes').value.trim()
  const msg   = $id('doc-msg')

  if (!title) { msg.className = 'form-msg error'; msg.textContent = 'Please enter a document title.'; return }

  const { data: { session } } = await sb.auth.getSession()
  if (!session) return

  msg.className = 'form-msg'; msg.textContent = 'Submitting...'

  const res = await fetch('/api/upload-doc', {
    method: 'POST',
    headers: { Authorization: `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ doc_title: title, doc_type: type, doc_link: link, doc_notes: notes })
  })

  if (res.ok) {
    msg.className = 'form-msg ok'; msg.textContent = 'Document submitted successfully.'
    $id('doc-title').value = ''; $id('doc-type').value = ''; $id('doc-link').value = ''; $id('doc-notes').value = ''
  } else {
    msg.className = 'form-msg error'; msg.textContent = 'Submission failed. Please try again.'
  }
}

function renderAll() {
  renderOverview()
  renderJourney()
  renderSchools()
  renderServices()
  renderProfile()
  renderRecommendations()
  renderGolf()
  renderDocuments()
}


sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    $id('auth-screen').style.display = 'none'

    // Try instant cache load (< 30 min old) — v2 schema only
    try {
      const cached = localStorage.getItem('portal_cache')
      if (cached) {
        const parsed = JSON.parse(cached)
        // Invalidate old cache format (had golfRounds at top level)
        if (parsed.golfRounds !== undefined) { localStorage.removeItem('portal_cache'); throw new Error('old cache') }
        const { D: cD, ts } = parsed
        if (Date.now() - ts < 30 * 60 * 1000) {
          D = cD; golfRounds = D.golfRounds || []; userRole = D.role || 'parent'
          $id('header-name').textContent = (D && D.student && (D.student.preferredName || D.student.studentName)) || 'Parent'
          renderAll()
          $id('loading').classList.remove('show')
          $id('loading').style.display = 'none'
          $id('app').style.display = 'flex'
          $id('app').classList.add('visible')
          // Refresh in background silently
          loadData(session.access_token).then(fresh => {
            D = fresh; golfRounds = D.golfRounds || []; userRole = D.role || 'parent'
            try { localStorage.setItem('portal_cache', JSON.stringify({ D, ts: Date.now() })) } catch(e) {}
            renderAll()
          }).catch(() => {})
          return
        }
      }
    } catch(e) {}

    try {
      const [dataRes] = await Promise.all([
        loadData(session.access_token),
      ])

      D = dataRes
      userRole = D.role || 'parent'
      golfRounds = D.golfRounds || []

      // Cache for instant reload
      try {
        localStorage.setItem('portal_cache', JSON.stringify({ D, ts: Date.now() }))
      } catch(e) {}

      $id('header-name').textContent = (D && D.student && (D.student.preferredName || D.student.studentName)) || 'Parent'
      renderAll()

      $id('loading').style.display = 'none'
      $id('app').style.display = 'flex'
      $id('app').classList.add('visible')

    } catch (err) {
      console.error('Load error:', err)
      $id('loading').style.display = 'none'
      resetAuthForm()
      $id('auth-screen').style.display = 'flex'
      const errEl = $id('auth-error')
      errEl.textContent = 'Could not load your data (' + (err.message || 'server error') + '). Please check your connection and try again.'
      errEl.style.display = 'block'
      await sb.auth.signOut()
    }

  } else {
    $id('loading').style.display = 'none'
    $id('auth-screen').style.display = 'flex'
  }
})
</script>
