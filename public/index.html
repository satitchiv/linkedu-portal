<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedU Parent Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Design tokens — LinkedU Bible (light) ─────────── */
    :root {
      --gold:     #B8962E;
      --gold-dim: #8a6e22;
      --bg:       #f5f0e8;
      --surface:  #ffffff;
      --surface2: #f5f0e8;
      --surface3: #ece7df;
      --border:   rgba(0,0,0,0.08);
      --text:     #1a1a1a;
      --muted:    #666;
      --muted2:   #999;
      --cream:    #f5f0e8;
      --red:      #c0392b;
      --amber:    #d68910;
      --green:    #27ae60;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .lang-th { display: none; }
    .portal-lang-th .lang-th { display: inline; }
    .portal-lang-th .lang-en { display: none; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { color: #daa520; }
    h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }

    /* ── Auth screen ───────────────────────────────────── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 36px;
    }
    .auth-card h2 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 24px;
    }
    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field-group input {
      width: 100%;
      background: #f5f0e8;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 4px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: var(--gold); }
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 11px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #caa938; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.4);
      border-radius: 4px;
      color: #e74c3c;
      font-size: 13px;
      display: none;
    }

    /* ── App shell ─────────────────────────────────────── */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    /* ── Header ────────────────────────────────────────── */
    #header {
      background: #1a1a1a;
      border-bottom: 1px solid #2c2c2c;
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }
    .header-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      color: var(--gold);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .header-student {
      flex: 1;
      color: #888;
      font-size: 12px;
    }
    .header-student span { color: #e8e3da; font-weight: 500; }
    .header-signout {
      font-size: 11px;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .header-signout:hover { color: #999; }
    .header-lang {
      font-size: 11px; color: #888; cursor: pointer;
      background: none; border: 1px solid #333;
      border-radius: 3px; padding: 3px 8px;
      font-family: 'Inter', sans-serif; letter-spacing: 0.03em;
      margin-right: 4px; transition: color 0.2s, border-color 0.2s;
    }
    .header-lang:hover { color: #ccc; border-color: #555; }

    /* ── Tab nav ───────────────────────────────────────── */
    #tabnav {
      background: var(--surface);
      border-bottom: 1px solid rgba(0,0,0,0.10);
      padding: 0 32px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── Main content ──────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 36px 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Loading ───────────────────────────────────────── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.05em;
    }
    #loading.show { display: flex; }

    /* ── Cards ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 16px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      cursor: default;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted2);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Section headers ───────────────────────────────── */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Badges ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-green  { background: rgba(39,174,96,.15);  color: #2ecc71; }
    .badge-amber  { background: rgba(214,137,16,.15); color: #f39c12; }
    .badge-red    { background: rgba(192,57,43,.15);  color: #e74c3c; }
    .badge-muted  { background: var(--surface2);      color: var(--muted); }
    .badge-gold   { background: rgba(184,150,46,.15); color: var(--gold); }

    /* ── Tables ────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted2);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      color: var(--text);
      font-size: 13px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,0,0,0.025); }

    /* ── Timeline ──────────────────────────────────────── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .tl-item {
      position: relative;
      padding: 0 0 20px 16px;
    }
    .tl-dot {
      position: absolute;
      left: -21px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
    }
    .tl-dot.done    { background: var(--green);  border-color: var(--green);  }
    .tl-dot.in-prog { background: var(--gold);   border-color: var(--gold);   }
    .tl-dot.overdue { background: var(--red);    border-color: var(--red);    }
    .tl-dot.pending { background: var(--bg);     border-color: var(--muted2); }
    .tl-date { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .tl-title { font-size: 13px; color: var(--text); }
    .tl-notes { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Stage bar ─────────────────────────────────────── */
    .stage-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
    }
    .stage-item {
      flex: 1;
      text-align: center;
    }
    .stage-dot-wrap {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .stage-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .stage-dot.active  { background: var(--gold); border-color: var(--gold); }
    .stage-dot.done    { background: var(--green); border-color: var(--green); }
    .stage-label {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stage-label.active { color: var(--gold); }

    /* ── Service cards ─────────────────────────────────── */
    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted2);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .service-card.active { border-left-color: var(--gold); }
    .service-name { font-size: 14px; font-weight: 500; flex: 1; }
    .service-status { font-size: 11px; color: var(--muted); }

    /* ── Golf ──────────────────────────────────────────── */
    .round-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }
    .round-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }
    .round-date { font-size: 13px; color: var(--text); font-weight: 500; }
    .round-course { font-size: 12px; color: var(--muted); }
    .round-score { margin-left: auto; font-family: 'Playfair Display', Georgia, serif; font-size: 18px; color: var(--gold); }
    .round-details { font-size: 11px; color: var(--muted2); }

    /* ── Document list ─────────────────────────────────── */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .doc-icon.submitted { background: var(--green); }
    .doc-icon.pending   { background: var(--amber); }
    .doc-icon.missing   { background: var(--red); }
    .doc-title { flex: 1; font-size: 13px; }
    .doc-meta  { font-size: 11px; color: var(--muted); }

    /* ── Upload form ───────────────────────────────────── */
    .upload-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      margin-top: 20px;
    }
    .upload-form h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 18px;
      color: var(--text);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%;
      background: #f5f0e8;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 3px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: var(--gold); }
    .form-field select option { background: var(--surface); }
    .btn-submit {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 3px;
      padding: 9px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #caa938; }
    .form-msg { margin-top: 12px; font-size: 12px; }
    .form-msg.ok    { color: var(--green); }
    .form-msg.error { color: #e74c3c; }

    /* ── Hero banner ───────────────────────────────────── */
    .hero-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }
    .hero-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .hero-sub { font-size: 12px; color: var(--muted); }
    .hero-fields { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; }
    .hero-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 3px; }
    .hero-field-value { font-size: 13px; color: var(--text); }

    /* ── Urgent strip ──────────────────────────────────── */
    .urgent-strip {
      background: rgba(192,57,43,.1);
      border: 1px solid rgba(192,57,43,.25);
      border-radius: 4px;
      padding: 14px 20px;
      margin-bottom: 20px;
    }
    .urgent-strip h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e74c3c;
      margin-bottom: 10px;
    }
    .urgent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      padding: 4px 0;
    }
    .urgent-days { color: #e74c3c; font-weight: 600; font-size: 12px; min-width: 60px; }
    .urgent-days.amber { color: var(--amber); }

    /* ── Profile grid ──────────────────────────────────── */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .profile-cell {
      background: var(--surface);
      padding: 14px 18px;
    }
    .profile-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 4px; }
    .profile-cell-value { font-size: 13px; color: var(--text); }

    /* ── Empty state ───────────────────────────────────── */
    .empty { color: var(--muted2); font-size: 13px; padding: 32px 0; text-align: center; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 640px) {
      #main { padding: 20px 16px; }
      #header { padding: 0 16px; }
      #tabnav { padding: 0 16px; }
      .tab-btn { padding: 12px 14px; font-size: 11px; }
      .hero-fields { gap: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .auth-card { padding: 32px 24px; }
    }
  
    /* ── Overview cockpit ──────────────────────────────── */
    .ov-rightnow {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 4px;
      padding: 26px 30px; margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 24px; flex-wrap: wrap;
    }
    .ov-rn-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .16em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .ov-rn-title { font-family: 'Playfair Display', serif; font-size: 1.2rem;
      color: var(--text); margin-bottom: 10px; line-height: 1.4; }
    .ov-rn-owner { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .ov-rn-right { text-align: center; flex-shrink: 0; }
    .ov-rn-days { font-family: 'Playfair Display', serif; font-size: 3rem;
      font-weight: 400; line-height: 1; }
    .ov-rn-days-lbl { font-size: 10px; color: var(--muted2); letter-spacing: .08em;
      text-transform: uppercase; margin-top: 2px; }
    .ov-rn-date { font-size: 12px; color: var(--muted); margin: 6px 0 8px; }
    .ov-owner-badge { font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 3px; letter-spacing: .06em; }
    .own-both { background: rgba(184,150,46,.15); color: var(--gold); }
    .own-satit { background: rgba(100,150,200,.15); color: #6dacca; }
    .own-parent { background: rgba(100,180,100,.15); color: #6dca8d; }
    .ov-status-board { display: grid; grid-template-columns: repeat(4,1fr);
      gap: 14px; margin-bottom: 28px; }
    .ov-sb-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 18px 20px; cursor: pointer;
      transition: border-color .2s; }
    .ov-sb-card:hover { border-color: var(--gold); }
    .ov-sb-alert { border-left: 3px solid var(--red); }
    .ov-sb-label { font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted2); margin-bottom: 6px; }
    .ov-sb-value { font-family: 'Playfair Display', serif; font-size: 1.1rem;
      color: var(--text); margin-bottom: 4px; }
    .ov-sb-sub { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .ov-sb-link { font-size: 11px; color: var(--gold); font-weight: 600; }
    .ov-wn-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
    .ov-wn-hdr { font-size: 10px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--gold); padding: 14px 20px;
      border-bottom: 1px solid var(--border); }
    .ov-wn-row { display: flex; align-items: center; gap: 14px; padding: 13px 20px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
    .ov-wn-row:last-child { border-bottom: none; }
    .ov-wn-row:hover { background: var(--surface2); }
    .ov-wn-body { flex: 1; }
    .ov-wn-lbl { font-size: 13px; color: var(--text); margin-bottom: 2px; }
    .ov-wn-src { font-size: 11px; color: var(--muted2); }
    .ov-wn-days { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }
    .stage-progress { background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 20px 24px; }
    .stage-steps { display: flex; gap: 0; margin-bottom: 16px; }
    .stage-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }

function $id(id) { return document.getElementById(id) }

function fmtDate(d) {
  if (!d) return '—'
  const dt = new Date(d)
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
}

function daysUntil(d) {
  if (!d) return null
  const diff = new Date(d) - new Date()
  return Math.ceil(diff / 86400000)
}

function statusBadge(s) {
  const map = {
    'Complete': 'badge-green',
    'Completed': 'badge-green',
    'Done': 'badge-green',
    'Uploaded': 'badge-green',
    'Active': 'badge-gold',
    'In Progress': 'badge-amber',
    'Pending': 'badge-amber',
    'Not Started': 'badge-muted',
    'Overdue': 'badge-red',
    'submitted': 'badge-amber',
    'reviewed': 'badge-gold',
    'verified': 'badge-green',
    'rejected': 'badge-red',
  }
  const cls = map[s] || 'badge-muted'
  return `<span class="badge ${cls}">${s || 'Unknown'}</span>`
}

function tlDotClass(status) {
  if (!status) return 'pending'
  const s = status.toLowerCase()
  if (s.includes('complete') || s.includes('done') || s.includes('verified')) return 'done'
  if (s.includes('progress') || s.includes('active')) return 'in-prog'
  if (s.includes('overdue')) return 'overdue'
  return 'pending'
}

// ── Auth ─────────────────────────────────────────────────────────────────────
async function signIn() {
  const email = $id('auth-email').value.trim()
  const btn = $id('auth-btn')
  const err = $id('auth-error')

  if (!email) {
    err.textContent = 'Please enter your email address.'
    err.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = 'Sending...'
  err.style.display = 'none'

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin }
  })

  if (error) {
    err.textContent = error.message
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Send me a login link'
  } else {
    $id('auth-sent-email').textContent = email
    $id('auth-form-wrap').style.display = 'none'
    $id('auth-sent-wrap').style.display = 'block'
  }
}

function toggleLang() {
  const isNowTH = !document.body.classList.contains('portal-lang-th')
  document.body.classList.toggle('portal-lang-th', isNowTH)
  $id('lang-btn').textContent = isNowTH ? 'ภาษาไทย | EN' : 'EN | ภาษาไทย'
  localStorage.setItem('portal_lang', isNowTH ? 'th' : 'en')
}

function resetAuthForm() {
  $id('auth-form-wrap').style.display = 'block'
  $id('auth-sent-wrap').style.display = 'none'
  $id('auth-btn').disabled = false
  $id('auth-btn').textContent = 'Send me a login link'
  $id('auth-error').style.display = 'none'
}

async function signOut() {
  await sb.auth.signOut()
  D = null
  golfRounds = []
  $id('app').classList.remove('visible')
  $id('app').style.display = 'none'
  resetAuthForm()
  $id('auth-email').value = ''
  $id('auth-screen').style.display = 'flex'
}

// ── Enter key on email field ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  $id('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') signIn()
  })
  // Restore language preference
  if (localStorage.getItem('portal_lang') === 'th') {
    document.body.classList.add('portal-lang-th')
    const btn = $id('lang-btn')
    if (btn) btn.textContent = 'ภาษาไทย | EN'
  }
})

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData(token) {
  const res = await fetch('/api/student', {
    headers: { Authorization: `Bearer ${token}` }
  })
  if (!res.ok) throw new Error(`Student API error ${res.status}`)
  return res.json()
}

async function loadGolfRounds(token, studentId) {
  try {
    const res = await fetch(`/api/golf-rounds?student_id=${studentId}`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    if (res.ok) {
      const j = await res.json()
      return j.rounds || []
    }
  } catch (e) { /* non-fatal */ }
  return []
}

  if (d === null) return 'var(--muted)'
  if (d < 0)   return 'var(--red)'
  if (d < 30)  return 'var(--red)'
  if (d < 60)  return 'var(--amber)'
  return 'var(--green)'
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function showTab(name) {
  currentTab = name
  const tabs = ['overview','journey','schools','services','profile','recommendations','golf','documents']
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', tabs[i] === name)
  })
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
  $id(`tab-${name}`).classList.add('active')
}

// ── Overview (cockpit) ────────────────────────────────────────────────────────
function renderOverview() {
  const ms = D.milestones || []
  const docs = D.documents || []

  // Build all urgent items: school events + Notion milestones
  const allEvents = []
  SCHOOL_EVENTS.forEach(ev => {
    const d = daysUntil(ev.date)
    if (d !== null && d >= 0) {
      allEvents.push({ days: d, label: ev.label, date: ev.date,
        school: ev.school, owner: ev.owner, type: ev.type, tab: 'schools' })
    }
  })
  ms.forEach(m => {
    const s = (m.status || '').toLowerCase()
    if (s.includes('complete') || s.includes('done')) return
    const d = daysUntil(m.date)
    if (d !== null && d >= 0) {
      allEvents.push({ days: d, label: m.title, date: m.date,
        school: null, owner: 'Both', type: 'milestone', tab: 'journey' })
    }
  })
  allEvents.sort((a,b) => a.days - b.days)

  const top = allEvents[0]
  let zone1 = ''
  if (top) {
    const col = urgColour(top.days)
    const ownCls = top.owner === 'Both' ? 'own-both' : top.owner === 'Satit' ? 'own-satit' : 'own-parent'
    const ownerNote = {
      Parent: 'This requires your action.',
      Satit: 'Satit is handling this — no action needed from you yet.',
      Both: 'This requires action from both you and Satit.'
    }[top.owner] || ''
    zone1 = `<div class="ov-rightnow">
      <div style="flex:1">
        <div class="ov-rn-eyebrow">Most Urgent Right Now</div>
        ${top.school ? `<div style="font-size:10px;color:var(--muted2);margin-bottom:5px;letter-spacing:.06em">${top.school.toUpperCase()}</div>` : ''}
        <div class="ov-rn-title">${top.label}</div>
        <div class="ov-rn-owner">${ownerNote}</div>
      </div>
      <div class="ov-rn-right">
        <div class="ov-rn-days" style="color:${col}">${top.days}</div>
        <div class="ov-rn-days-lbl">days away</div>
        <div class="ov-rn-date">${fmtDate(top.date)}</div>
        <span class="ov-owner-badge ${ownCls}">${top.owner}</span>

  // Zone 2 — status board
  const nextSchoolEv = SCHOOL_EVENTS
    .filter(e => daysUntil(e.date) >= 0)
    .sort((a,b) => daysUntil(a.date) - daysUntil(b.date))[0]

    ? `Next: ${nextSchoolEv.label.substring(0,32)} in ${daysUntil(nextSchoolEv.date)}d`

  const zone2 = `<div class="ov-status-board">

      <div class="ov-sb-link">View camps →</div>

      <div class="ov-sb-link">View plan →</div>
    </div>
  </div>`

  const top3 = allEvents.slice(0, 3)

    const col = urgColour(item.days)
    const src = item.school ? item.school.split(' ')[0].toUpperCase() : 'MILESTONE'

// ── Schools (application tracker) ────────────────────────────────────────────
function renderSchools() {
  // Urgency strip — all upcoming events within 120 days
  const upcoming = SCHOOL_EVENTS
    .map(e => ({ ...e, days: daysUntil(e.date) }))
    .filter(e => e.days !== null && e.days >= 0 && e.days <= 120)
    .sort((a,b) => a.days - b.days)
    .slice(0, 6)

  const ownCls = o => o === 'Both' ? 'own-both' : o === 'Satit' ? 'own-satit' : 'own-parent'
  const urgRows = upcoming.map(e => {
    const col = urgColour(e.days)
    return `<div class="sa-urg-row">
      <div class="sa-urg-dot" style="background:${col}"></div>
      <span class="sa-urg-school">${e.school.split(' ')[0]}</span>
      <span class="sa-urg-lbl">${e.label}</span>
      <span class="sa-urg-date">${fmtDate(e.date)}</span>
      <span class="sa-urg-days" style="color:${col}">${e.days}d</span>
      <span class="ov-owner-badge ${ownCls(e.owner)}" style="font-size:9px;padding:1px 6px">${e.owner}</span>
    </div>`
  }).join('')

  const docIcons = { 'verified':'badge-green', 'pending':'badge-amber', 'missing':'badge-red', 'not-yet':'badge-muted' }
  const docLabels = { 'verified':'Verified', 'pending':'Pending', 'missing':'Missing', 'not-yet':'Not yet required' }

  const pipStages = { 'Researching':0,'Open Day':0,'Registration':0,'Application':0,'Interview':0,'Offer':0 }

  const cards = SHORTLISTED_SCHOOLS.map(sc => {
    // Pipeline
    const pip = sc.pipeline.map((stage, i) => {
      const isDone = i < sc.pipelineStage
      const isActive = i === sc.pipelineStage
      const dotCls = isDone ? 'pip-done' : isActive ? 'pip-active' : 'pip-upcoming'
      const lblCls = isDone ? 'pip-lbl-done' : isActive ? 'pip-lbl-active' : 'pip-lbl-up'
      return `<div class="sa-pip-step">
        <div class="sa-pip-top">
          <div class="sa-pip-dot ${dotCls}"></div>
          <div class="sa-pip-line"></div>
        </div>
        <div class="sa-pip-lbl ${lblCls}">${stage}</div>
      </div>`
    }).join('')

    // Events
    const scEvents = SCHOOL_EVENTS
      .filter(e => e.school === sc.name.split(' ')[0])
      .map(e => {
        const d = daysUntil(e.date)
        const col = urgColour(d)
        return `<div class="sa-ev-row">
          <div class="sa-ev-lbl">${e.label}</div>
          <div class="sa-ev-days" style="color:${col}">${d !== null ? d + 'd' : fmtDate(e.date)}</div>
          <span class="sa-ev-own ov-owner-badge ${ownCls(e.owner)}" style="font-size:9px;padding:1px 6px">${e.owner}</span>
        </div>`
      }).join('')

    // Docs
    const docRows = sc.docs.map((doc, i) => {
      const st = sc.docStatus[i] || 'not-yet'
      return `<div class="sa-doc-row">
        <span class="badge ${docIcons[st]}" style="font-size:9px">${docLabels[st]}</span>
        <span class="sa-doc-lbl">${doc}</span>
      </div>`
    }).join('')

    const golfChip = sc.golfNote
      ? `<div class="sa-golf-chip">Golf — ${sc.golfNote}</div>`
      : ''
    const thb = `฿${Math.round(sc.fee * 46 / 1000)}k`

    return `<div class="sa-card">
      <div class="sa-card-head">
        <div>
          <div class="sa-card-name">${sc.name}</div>
          <div class="sa-card-meta">${sc.loc} · ${sc.type}</div>
          <div class="sa-card-fee">£${sc.fee.toLocaleString()} / yr · ${thb} · ${sc.entry}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="sa-role ${sc.roleCls}">${sc.role}</span>
          <span class="sa-status ${sc.statusCls}">${sc.status}</span>
        </div>
      </div>
      ${golfChip}
      <div class="sa-pipeline">${pip}</div>
      <div class="sa-body">
        <div class="sa-col">
          <div class="sa-sec-lbl">Key Dates &amp; Events</div>
          ${scEvents || '<div style="font-size:12px;color:var(--muted)">No events listed</div>'}
        </div>
        <div class="sa-col">
          <div class="sa-sec-lbl">Documents</div>
          ${docRows}
          <div class="sa-note">${sc.note}</div>
        </div>
      </div>
      <div class="sa-actions">
        <a href="https://linkeduth.netlify.app/schools/${sc.slug}.html" target="_blank" class="btn-sm">View School Profile →</a>
        <a href="https://line.me/R/ti/p/@linkedu" target="_blank" class="btn-sm btn-sm-primary">Ask Satit</a>
      </div>
    </div>`
  }).join('')

  const html = `
    <div class="sa-summary">
      <div class="sa-sum-card"><div class="sa-sum-num">5</div><div class="sa-sum-lbl">Schools Tracked</div></div>
      <div class="sa-sum-card"><div class="sa-sum-num">3</div><div class="sa-sum-lbl">Shortlisted</div></div>
      <div class="sa-sum-card"><div class="sa-sum-num">2</div><div class="sa-sum-lbl">Researching</div></div>
      <div class="sa-sum-card"><div class="sa-sum-num" style="color:var(--amber)">Sep 2027</div><div class="sa-sum-lbl">Target Entry</div></div>
    </div>
    <div class="sa-urgency">
      <div class="sa-urg-hdr">Upcoming — Next 120 Days</div>
      ${urgRows || '<div style="font-size:12px;color:var(--muted)">No events in the next 120 days</div>'}
    </div>
    <div class="section-title">Application Tracker</div>
    ${cards}`

  $id('schools-content').innerHTML = html
}

// ── Services ──────────────────────────────────────────────────────────────────
function renderServices() {
  const svcs = D.subscriptions || []
  let html = `<div class="section-title">Your Services</div>`
  if (!svcs.length) {
    html += `<div class="empty">No services found.</div>`
  } else {
    const active = svcs.filter(s => s.active)
    const inactive = svcs.filter(s => !s.active)
    if (active.length) {
      html += `<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:10px">Active</div>`
      active.forEach(s => {
        html += `<div class="service-card active"><div class="service-name">${s.service}</div>${statusBadge('Active')}</div>`
      })

    if (inactive.length) {
      html += `<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin:20px 0 10px">Other</div>`
      inactive.forEach(s => {
        html += `<div class="service-card"><div class="service-name" style="color:var(--muted)">${s.service}</div>${statusBadge('Inactive')}</div>`
      })
    }
  }
  $id('services-content').innerHTML = html
}

// ── Golf Storage (computeRoundStats inline) ────────────────────────────────
const GolfStorage = (() => {
  function computeRoundStats(round) {
    const holes = round.holes || [];
    const totalScore  = holes.reduce((s, h) => s + (h.score || 0), 0);
    const totalPar    = holes.reduce((s, h) => s + (h.par   || 4), 0);
    const scoreToPar  = totalScore - totalPar;
    const totalPutts  = holes.reduce((s, h) => s + (h.putts || 0), 0);
    let fairwaysHit = 0, fairwaysApplicable = 0;
    holes.forEach(h => {
      if ((h.par || 4) >= 4) {
        fairwaysApplicable++;
        const teeShot = (h.shots || [])[0];
        if (teeShot && teeShot.result === 'Fairway') fairwaysHit++;
      }
    });
    let greensInRegulation = 0;
    holes.forEach(h => {
      const par = h.par || 4, putts = h.putts || 0, score = h.score || 0;
      if (score > 0 && putts >= 0 && (score - putts) <= (par - 2)) greensInRegulation++;
    });
    const front9Score = holes.slice(0,9).reduce((s,h)=>s+(h.score||0),0);
    const back9Score  = holes.slice(9,18).reduce((s,h)=>s+(h.score||0),0);
    const mentalRatings = holes.map(h => h.mentalRating || 1);
    const mentalRatingAvg = mentalRatings.length
      ? Math.round(10 * mentalRatings.reduce((a,b)=>a+b,0)/mentalRatings.length)/10 : 1;
    const clubsUsed = {};
    let pure = 0, ok = 0, mishit = 0;
    holes.forEach(h => {
      (h.shots || []).forEach(s => {
        clubsUsed[s.club] = (clubsUsed[s.club] || 0) + 1;
        if      (s.quality === 'Pure')   pure++;
        else if (s.quality === 'OK')     ok++;
        else if (s.quality === 'Mishit') mishit++;
      });
    });
    const teeClubBreakdown = {};
    holes.forEach(h => {
      if ((h.par || 4) >= 4) {
        const teeShot = (h.shots || [])[0];
        if (teeShot && teeShot.club && teeShot.club !== 'Putter') {
          const c = teeShot.club;
          if (!teeClubBreakdown[c]) teeClubBreakdown[c] = { attempts:0, fairways:0 };
          teeClubBreakdown[c].attempts++;
          if (teeShot.result === 'Fairway') teeClubBreakdown[c].fairways++;
        }
      }
    });
    const approachClubBreakdown = {};
    holes.forEach(h => {
      const par=h.par||4, putts=h.putts||0, score=h.score||0;
      if (score>0 && (score-putts)<=(par-2)) {
        const shots=(h.shots||[]).slice().reverse();
        const approach=shots.find(s=>s.club&&s.club!=='Putter');
        if (approach) approachClubBreakdown[approach.club]=(approachClubBreakdown[approach.club]||0)+1;
      }
    });
    return { totalScore, scoreToPar, totalPutts, fairwaysHit, fairwaysApplicable,
      greensInRegulation, front9Score, back9Score, mentalRatingAvg,
      mentalByHole:mentalRatings, clubsUsed, qualityBreakdown:{pure,ok,mishit},
      teeClubBreakdown, approachClubBreakdown };
  }
  return { computeRoundStats };
})();

function stpStr(n) { return n===0?'E':n>0?'+'+n:''+n; }
function stpClass(n) { return n<=-1?'under':n===0?'even':'over'; }
function mentalEmoji(m) { return m<=1.5?'😊':m<=2.5?'😐':'😤'; }
function fmtTeeClubs(bd) {
  if (!bd||!Object.keys(bd).length) return '';
  return Object.entries(bd).sort((a,b)=>b[1].attempts-a[1].attempts)
    .map(([c,d])=>`${c}: ${d.fairways}/${d.attempts}`).join(' · ');
}
function fmtApproachClubs(bd) {
  if (!bd||!Object.keys(bd).length) return '';
  return Object.entries(bd).sort((a,b)=>b[1]-a[1]).slice(0,4)
    .map(([c,n])=>`${c} ×${n}`).join(' · ');
}

function normalizeRound(r) {
  // Normalize Supabase column names → golf_tab.py format
  const holes = (r.holes || []).map(h => ({
    holeNumber:   h.holeNumber || h.hole_number || h.hole || 0,
    par:          h.par || 4,
    score:        h.score || h.strokes || 0,
    putts:        h.putts || 0,
    mentalRating: h.mentalRating || h.mental_rating || 1,
    shots:        h.shots || [],
    noteText:     h.noteText || h.note_text || '',
    noteAudioUrl: h.noteAudioUrl || h.note_audio_url || null,
    media:        h.media || [],
  }));
  return {
    roundId:            r.roundId || r.id,
    id:                 r.id,
    date:               r.date,
    course:             r.course,
    tees:               r.tees,
    roundType:          r.roundType || r.round_type,
    weather:            r.weather,
    conditions:         r.conditions,
    coachRecommendation: r.coachRecommendation || r.coach_recommendation,
    debriefNotes:       r.debriefNotes || r.debrief,
    roundAudioUrl:      r.roundAudioUrl || r.round_voice_memo,
    holes,
  };
}

async function fetchRounds(studentId) {
  try {
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) return [];
    const res = await fetch(`/api/golf-rounds?student_id=${encodeURIComponent(studentId)}`, {
      headers: { Authorization: `Bearer ${session.access_token}` }
    });
    if (!res.ok) return [];
    const json = await res.json();
    const raw = json.rounds || json || [];
    return raw.map(normalizeRound);
  } catch(e) { return []; }
}

function renderProgressCharts(rounds) {
  const listEl = document.getElementById('golf-history-list');
  if (!listEl || rounds.length < 3) return;
  const last10 = rounds.slice(0,10).reverse();
  const labels = last10.map(r=>fmtDateGolf(r.date).slice(0,6));
  const comps  = last10.map(r=>r.computed||GolfStorage.computeRoundStats(r));
  const scores = comps.map(c=>c.totalScore);
  const putts  = comps.map(c=>c.totalPutts);
  const girs   = comps.map(c=>c.greensInRegulation);
  const mentals= comps.map(c=>+(c.mentalRatingAvg).toFixed(1));
  const chartsHtml = `
    <p class="sec-label" style="margin-top:32px">
      <span class="lang-en">Progress Over Time</span><span class="lang-th">พัฒนาการในระยะยาว</span>
    </p>
    <div class="chart-wrap-golf"><div class="chart-title">Scoring Average</div><canvas id="gc-score" height="80"></canvas></div>
    <div class="chart-wrap-golf"><div class="chart-title">Putts Per Round</div><canvas id="gc-putts" height="80"></canvas></div>
    <div class="chart-wrap-golf"><div class="chart-title">Greens in Regulation</div><canvas id="gc-gir" height="80"></canvas></div>
    <div class="chart-wrap-golf"><div class="chart-title">Mental Rating (1=Composed · 3=Struggled)</div><canvas id="gc-mental" height="80"></canvas></div>
    <div class="mental-note">
      <span class="lang-en">These charts show long-term trends, not judgements from any single round.</span>
      <span class="lang-th">กราฟเหล่านี้แสดงแนวโน้มในระยะยาว ไม่ใช่การตัดสินจากรอบใดรอบหนึ่ง</span>
    </div>`;
  listEl.insertAdjacentHTML('beforeend', chartsHtml);
  setTimeout(() => {
    if (!window.Chart) return;
    [{id:'gc-score',data:scores,color:'#B8962E'},
     {id:'gc-putts',data:putts,color:'#5a7aba'},
     {id:'gc-gir',data:girs,color:'#5a9a5a'},
     {id:'gc-mental',data:mentals,color:'#ca6d6d',min:1,max:3}
    ].forEach(cd => {
      const ctx = document.getElementById(cd.id);
      if (!ctx) return;
      new Chart(ctx, {
        type:'line',
        data:{labels,datasets:[{data:cd.data,borderColor:cd.color,backgroundColor:cd.color+'22',
          borderWidth:2,pointBackgroundColor:cd.color,pointRadius:4,fill:true,tension:0.3}]},
        options:{plugins:{legend:{display:false}},
          scales:{
            y:{min:cd.min,max:cd.max,ticks:{font:{size:11},color:'#aaa'},grid:{color:'#f0ebe2'}},
            x:{ticks:{font:{size:10},color:'#aaa'},grid:{display:false}}
          }
        }
      });
    });
  }, 100);
}

function computeCourseStats(rounds) {
  const byC={};
  rounds.forEach(r=>{
    const c=r.course||'Unknown';
    if (!byC[c]) byC[c]={course:c,rounds:[],scoreToPars:[],putts:[],girs:[]};
    const comp=r.computed||GolfStorage.computeRoundStats(r);
    byC[c].rounds.push(r); byC[c].scoreToPars.push(comp.scoreToPar);
    byC[c].putts.push(comp.totalPutts); byC[c].girs.push(comp.greensInRegulation);
  });
  return Object.values(byC).map(d=>{
    const avg=arr=>arr.length?Math.round(10*arr.reduce((a,b)=>a+b,0)/arr.length)/10:null;
    return {course:d.course,roundCount:d.rounds.length,avgScoreToPar:avg(d.scoreToPars),
      avgPutts:avg(d.putts),avgGIR:avg(d.girs),rounds:d.rounds};
  }).sort((a,b)=>b.roundCount-a.roundCount);
}

async function renderCompare() {
  const el=document.getElementById('golf-compare-content');
  if (!cachedRounds.length) cachedRounds=await fetchRounds(D&&D.student&&D.student.id);
  const courseStats=computeCourseStats(cachedRounds);
  if (!courseStats.length) {
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🏌️</div><div class="empty-title"><span class="lang-en">No course data yet</span><span class="lang-th">ยังไม่มีข้อมูลสนาม</span></div></div>`;
    return;
  }
  const bestAvg=Math.min(...courseStats.filter(c=>c.avgScoreToPar!==null).map(c=>c.avgScoreToPar));
  const bestCourse=courseStats.find(c=>c.avgScoreToPar===bestAvg);
  const mostPlayed=courseStats[0];
  const rows=courseStats.map(cs=>{
    const isBest=bestCourse&&cs.course===bestCourse.course;
    const isMost=cs.course===mostPlayed.course;
    const stpAvg=cs.avgScoreToPar!==null?stpStr(Math.round(cs.avgScoreToPar)):'—';
    return `<tr><td style="font-weight:600">${cs.course}${isBest?'<span class="best-badge">Best Score</span>':''}${isMost?'<span class="most-played-badge">Most Played</span>':''}</td><td style="text-align:center">${cs.roundCount}</td><td style="text-align:center;font-weight:600;color:${cs.avgScoreToPar<=0?'#5a9a5a':'#1a1a1a'}">${stpAvg}</td><td style="text-align:center">${cs.avgPutts!==null?cs.avgPutts.toFixed(1):'—'}</td><td style="text-align:center">${cs.avgGIR!==null?cs.avgGIR.toFixed(1):'—'}</td></tr>`;
  }).join('');
  el.innerHTML=`
    <div class="comp-note"><span class="lang-en">Comparing results across courses helps identify where your child performs most confidently and where opportunities exist.</span><span class="lang-th">การเปรียบเทียบผลในหลายสนามช่วยให้เห็นว่าลูกถนัดสนามประเภทใด</span></div>

        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

    method: 'POST',
    headers: { Authorization: `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ doc_title: title, doc_type: type, doc_link: link, doc_notes: notes })
  })

  if (res.ok) {
    msg.className = 'form-msg ok'; msg.textContent = 'Document submitted successfully.'
    $id('doc-title').value = ''; $id('doc-type').value = ''; $id('doc-link').value = ''; $id('doc-notes').value = ''
  } else {
    msg.className = 'form-msg error'; msg.textContent = 'Submission failed. Please try again.'
  }
}

function renderAll() {
  renderOverview()
  renderJourney()
  renderSchools()
  renderServices()
  renderProfile()
  renderRecommendations()
  renderGolf()
  renderDocuments()
}


sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    $id('auth-screen').style.display = 'none'

    // Try instant cache load (< 30 min old)
    try {
      const cached = localStorage.getItem('portal_cache')
      if (cached) {
        const { D: cD, golfRounds: cR, ts } = JSON.parse(cached)
        if (Date.now() - ts < 30 * 60 * 1000) {
          D = cD; golfRounds = cR; userRole = D.role || 'parent'
          $id('header-name').textContent = D.student.studentName || 'Parent'
          renderAll()
          $id('app').style.display = 'flex'
          $id('app').classList.add('visible')
          // Refresh in background silently
          loadData(session.access_token).then(fresh => {
            D = fresh; userRole = D.role || 'parent'
            try { localStorage.setItem('portal_cache', JSON.stringify({ D, golfRounds, ts: Date.now() })) } catch(e) {}
            renderAll()
          }).catch(() => {})
          return
        }
      }
    } catch(e) {}

    $id('loading').classList.add('show')

    try {
      const [dataRes] = await Promise.all([
        loadData(session.access_token),
      ])

      D = dataRes
      userRole = D.role || 'parent'
      golfRounds = await loadGolfRounds(session.access_token, D.student.id)

      // Cache for instant reload
      try {
        localStorage.setItem('portal_cache', JSON.stringify({ D, golfRounds, ts: Date.now() }))
      } catch(e) {}

      $id('header-name').textContent = D.student.studentName || 'Parent'
      renderAll()

      $id('loading').classList.remove('show')
      $id('app').style.display = 'flex'
      $id('app').classList.add('visible')

    } catch (err) {
      console.error('Load error:', err)
      $id('loading').classList.remove('show')
      resetAuthForm()
      $id('auth-screen').style.display = 'flex'
      const errEl = $id('auth-error')
      errEl.textContent = 'Could not load your data (' + (err.message || 'server error') + '). Please check your connection and try again.'
      errEl.style.display = 'block'
      await sb.auth.signOut()
    }

  } else {
    $id('loading').classList.remove('show')
    $id('auth-screen').style.display = 'flex'
  }
})
</script>
