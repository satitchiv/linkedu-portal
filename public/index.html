<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedU Parent Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --gold:     #B8962E;
      --gold-dim: #8a6e22;
      --bg:       #111;
      --surface:  #1a1a1a;
      --surface2: #222;
      --surface3: #2a2a2a;
      --border:   #2c2c2c;
      --text:     #eee;
      --muted:    #777;
      --muted2:   #555;
      --cream:    #f5f0e8;
      --red:      #c0392b;
      --amber:    #d68910;
      --green:    #27ae60;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { color: #daa520; }
    h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }

    /* ── Auth screen ───────────────────────────────────── */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 36px;
    }
    .auth-card h2 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 24px;
    }
    .field-group { margin-bottom: 18px; }
    .field-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: var(--gold); }
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 11px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #caa938; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.4);
      border-radius: 4px;
      color: #e74c3c;
      font-size: 13px;
      display: none;
    }

    /* ── App shell ─────────────────────────────────────── */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    /* ── Header ────────────────────────────────────────── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }
    .header-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      color: var(--gold);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .header-student {
      flex: 1;
      color: var(--muted);
      font-size: 12px;
    }
    .header-student span { color: var(--text); font-weight: 500; }
    .header-signout {
      font-size: 11px;
      color: var(--muted2);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .header-signout:hover { color: var(--muted); }

    /* ── Tab nav ───────────────────────────────────────── */
    #tabnav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── Main content ──────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 36px 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Loading ───────────────────────────────────────── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 0.05em;
    }
    #loading.show { display: flex; }

    /* ── Cards ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 16px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      cursor: default;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted2);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Section headers ───────────────────────────────── */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Badges ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-green  { background: rgba(39,174,96,.15);  color: #2ecc71; }
    .badge-amber  { background: rgba(214,137,16,.15); color: #f39c12; }
    .badge-red    { background: rgba(192,57,43,.15);  color: #e74c3c; }
    .badge-muted  { background: var(--surface2);      color: var(--muted); }
    .badge-gold   { background: rgba(184,150,46,.15); color: var(--gold); }

    /* ── Tables ────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted2);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #1a1a1a;
      color: var(--text);
      font-size: 13px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Timeline ──────────────────────────────────────── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .tl-item {
      position: relative;
      padding: 0 0 20px 16px;
    }
    .tl-dot {
      position: absolute;
      left: -21px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
    }
    .tl-dot.done    { background: var(--green);  border-color: var(--green);  }
    .tl-dot.in-prog { background: var(--gold);   border-color: var(--gold);   }
    .tl-dot.overdue { background: var(--red);    border-color: var(--red);    }
    .tl-dot.pending { background: var(--bg);     border-color: var(--muted2); }
    .tl-date { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .tl-title { font-size: 13px; color: var(--text); }
    .tl-notes { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Stage bar ─────────────────────────────────────── */
    .stage-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
    }
    .stage-item {
      flex: 1;
      text-align: center;
    }
    .stage-dot-wrap {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .stage-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .stage-dot.active  { background: var(--gold); border-color: var(--gold); }
    .stage-dot.done    { background: var(--green); border-color: var(--green); }
    .stage-label {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stage-label.active { color: var(--gold); }

    /* ── Service cards ─────────────────────────────────── */
    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted2);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .service-card.active { border-left-color: var(--gold); }
    .service-name { font-size: 14px; font-weight: 500; flex: 1; }
    .service-status { font-size: 11px; color: var(--muted); }

    /* ── Golf ──────────────────────────────────────────── */
    .round-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }
    .round-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }
    .round-date { font-size: 13px; color: var(--text); font-weight: 500; }
    .round-course { font-size: 12px; color: var(--muted); }
    .round-score { margin-left: auto; font-family: 'Playfair Display', Georgia, serif; font-size: 18px; color: var(--gold); }
    .round-details { font-size: 11px; color: var(--muted2); }

    /* ── Document list ─────────────────────────────────── */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .doc-icon.submitted { background: var(--green); }
    .doc-icon.pending   { background: var(--amber); }
    .doc-icon.missing   { background: var(--red); }
    .doc-title { flex: 1; font-size: 13px; }
    .doc-meta  { font-size: 11px; color: var(--muted); }

    /* ── Upload form ───────────────────────────────────── */
    .upload-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      margin-top: 20px;
    }
    .upload-form h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 18px;
      color: var(--text);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: var(--gold); }
    .form-field select option { background: var(--surface); }
    .btn-submit {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 3px;
      padding: 9px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #caa938; }
    .form-msg { margin-top: 12px; font-size: 12px; }
    .form-msg.ok    { color: var(--green); }
    .form-msg.error { color: #e74c3c; }

    /* ── Hero banner ───────────────────────────────────── */
    .hero-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }
    .hero-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .hero-sub { font-size: 12px; color: var(--muted); }
    .hero-fields { display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; }
    .hero-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 3px; }
    .hero-field-value { font-size: 13px; color: var(--text); }

    /* ── Urgent strip ──────────────────────────────────── */
    .urgent-strip {
      background: rgba(192,57,43,.1);
      border: 1px solid rgba(192,57,43,.25);
      border-radius: 4px;
      padding: 14px 20px;
      margin-bottom: 20px;
    }
    .urgent-strip h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e74c3c;
      margin-bottom: 10px;
    }
    .urgent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      padding: 4px 0;
    }
    .urgent-days { color: #e74c3c; font-weight: 600; font-size: 12px; min-width: 60px; }
    .urgent-days.amber { color: var(--amber); }

    /* ── Profile grid ──────────────────────────────────── */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .profile-cell {
      background: var(--surface);
      padding: 14px 18px;
    }
    .profile-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 4px; }
    .profile-cell-value { font-size: 13px; color: var(--text); }

    /* ── Empty state ───────────────────────────────────── */
    .empty { color: var(--muted2); font-size: 13px; padding: 32px 0; text-align: center; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 640px) {
      #main { padding: 20px 16px; }
      #header { padding: 0 16px; }
      #tabnav { padding: 0 16px; }
      .tab-btn { padding: 12px 14px; font-size: 11px; }
      .hero-fields { gap: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading" class="show">LinkedU</div>

<!-- Auth screen -->
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">LINKEDU</div>
    <div class="auth-subtitle">Parent Portal</div>
    <h2>Sign in</h2>
    <div class="field-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="auth-password" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="auth-btn" onclick="signIn()">Sign in</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div id="header">
    <div class="header-logo">LINKEDU</div>
    <div class="header-student">Portal — <span id="header-name">Loading...</span></div>
    <button class="header-signout" onclick="signOut()">Sign out</button>
  </div>
  <div id="tabnav">
    <button class="tab-btn active" onclick="showTab('overview')">Overview</button>
    <button class="tab-btn" onclick="showTab('journey')">Journey</button>
    <button class="tab-btn" onclick="showTab('schools')">Schools</button>
    <button class="tab-btn" onclick="showTab('services')">Services</button>
    <button class="tab-btn" onclick="showTab('profile')">Profile</button>
    <button class="tab-btn" onclick="showTab('golf')">Golf</button>
    <button class="tab-btn" onclick="showTab('documents')">Documents</button>
  </div>
  <div id="main">
    <!-- Tab: Overview -->
    <div class="tab-panel active" id="tab-overview">
      <div id="overview-content"><div class="empty">Loading...</div></div>
    </div>
    <!-- Tab: Journey -->
    <div class="tab-panel" id="tab-journey">
      <div id="journey-content"><div class="empty">Loading...</div></div>
    </div>
    <!-- Tab: Schools -->
    <div class="tab-panel" id="tab-schools">
      <div id="schools-content"><div class="empty">Loading...</div></div>
    </div>
    <!-- Tab: Services -->
    <div class="tab-panel" id="tab-services">
      <div id="services-content"><div class="empty">Loading...</div></div>
    </div>
    <!-- Tab: Profile -->
    <div class="tab-panel" id="tab-profile">
      <div id="profile-content"><div class="empty">Loading...</div></div>
    </div>
    <!-- Tab: Golf -->
    <div class="tab-panel" id="tab-golf">
      <div id="golf-content"><div class="empty">Loading...</div></div>
    </div>
    <!-- Tab: Documents -->
    <div class="tab-panel" id="tab-documents">
      <div id="documents-content"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
// Replace these with your actual Supabase project values.
// The anon key is safe to expose in client-side code — it is designed for this.
const SUPABASE_URL      = 'https://ufspivvuevllmkxmivbe.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmc3BpdnZ1ZXZsbG1reG1pdmJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTU2MDUsImV4cCI6MjA4ODY5MTYwNX0.aybHZVeG4_gl5RDXjrhfTAKNq0sUEdYslwuwTdghIpk'

// ── Client ──────────────────────────────────────────────────────────────────
const { createClient } = window.supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ── State ───────────────────────────────────────────────────────────────────
let D = null          // all data from /api/student
let golfRounds = []
let currentTab = 'overview'
let userRole = 'parent'

// ── Utilities ───────────────────────────────────────────────────────────────
function $id(id) { return document.getElementById(id) }

function fmtDate(d) {
  if (!d) return '—'
  const dt = new Date(d)
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
}

function daysUntil(d) {
  if (!d) return null
  const diff = new Date(d) - new Date()
  return Math.ceil(diff / 86400000)
}

function statusBadge(s) {
  const map = {
    'Complete': 'badge-green',
    'Completed': 'badge-green',
    'Done': 'badge-green',
    'Uploaded': 'badge-green',
    'Active': 'badge-gold',
    'In Progress': 'badge-amber',
    'Pending': 'badge-amber',
    'Not Started': 'badge-muted',
    'Overdue': 'badge-red',
    'submitted': 'badge-amber',
    'reviewed': 'badge-gold',
    'verified': 'badge-green',
    'rejected': 'badge-red',
  }
  const cls = map[s] || 'badge-muted'
  return `<span class="badge ${cls}">${s || 'Unknown'}</span>`
}

function tlDotClass(status) {
  if (!status) return 'pending'
  const s = status.toLowerCase()
  if (s.includes('complete') || s.includes('done') || s.includes('verified')) return 'done'
  if (s.includes('progress') || s.includes('active')) return 'in-prog'
  if (s.includes('overdue')) return 'overdue'
  return 'pending'
}

// ── Auth ─────────────────────────────────────────────────────────────────────
async function signIn() {
  const email = $id('auth-email').value.trim()
  const password = $id('auth-password').value
  const btn = $id('auth-btn')
  const err = $id('auth-error')

  if (!email || !password) {
    err.textContent = 'Enter your email and password.'
    err.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = 'Signing in...'
  err.style.display = 'none'

  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) {
    err.textContent = error.message
    err.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Sign in'
  }
  // onAuthStateChange handles success
}

async function signOut() {
  await sb.auth.signOut()
  D = null
  golfRounds = []
  $id('app').classList.remove('visible')
  $id('app').style.display = 'none'
  $id('auth-screen').style.display = 'flex'
  $id('auth-email').value = ''
  $id('auth-password').value = ''
  $id('auth-btn').disabled = false
  $id('auth-btn').textContent = 'Sign in'
}

// ── Enter key on password field ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  $id('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') signIn()
  })
  $id('auth-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') $id('auth-password').focus()
  })
})

async function loadData(token) {
  const res = await fetch('/api/student', {
    headers: { Authorization: `Bearer ${token}` }
  })
  if (!res.ok) throw new Error(`Student API error ${res.status}`)
  return res.json()
}

async function loadGolfRounds(token, studentId) {
  try {
    const res = await fetch(`/api/golf-rounds?student_id=${studentId}`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    if (res.ok) {
      const j = await res.json()
      return j.rounds || []
    }
  } catch (e) { /* non-fatal */ }
  return []
}

// ── Render helpers ────────────────────────────────────────────────────────────
function urgentItems(milestones) {
  return milestones
    .filter(m => {
      if (!m.date) return false
      const d = daysUntil(m.date)
      const done = ['complete','completed','done'].some(x => (m.status||'').toLowerCase().includes(x))
      return !done && d !== null && d <= 30
    })
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .slice(0, 5)
}

// ── Journey ───────────────────────────────────────────────────────────────────
function renderJourney() {
  const stages = ['Discovery', 'Preparation', 'Application', 'Shortlist', 'Transition']
  const currentStage = D.student.stage || ''
  const ms = D.milestones || []

  let html = `<div class="section-title">Stage Progress</div>`

  // Stage bar
  html += `<div style="display:flex;margin-bottom:32px;gap:0">`
  stages.forEach((s, i) => {
    const isActive = currentStage.toLowerCase().includes(s.toLowerCase())
    const isDone = stages.indexOf(currentStage) > i
    const dot = isDone ? 'done' : isActive ? 'active' : 'pending'
    html += `<div style="flex:1;text-align:center">
      <div style="display:flex;align-items:center;margin-bottom:8px">
        ${i > 0 ? `<div style="flex:1;height:1px;background:${isDone ? 'var(--green)' : 'var(--border)'}"></div>` : ''}
        <div class="stage-dot ${dot}" style="margin:0 auto"></div>
        ${i < stages.length - 1 ? `<div style="flex:1;height:1px;background:${isDone ? 'var(--green)' : 'var(--border)'}"></div>` : ''}
      </div>
      <div class="stage-label ${isActive ? 'active' : ''}" style="font-size:10px">${s}</div>
    </div>`
  })
  html += `</div>`

  // Milestone timeline
  html += `<div class="section-title">Milestones</div>`

  if (!ms.length) {
    html += `<div class="empty">No milestones found.</div>`
  } else {
    const sorted = [...ms].sort((a, b) => {
      if (!a.date && !b.date) return 0
      if (!a.date) return 1
      if (!b.date) return -1
      return new Date(a.date) - new Date(b.date)
    })

    html += `<div class="timeline">`
    sorted.forEach(m => {
      const dot = tlDotClass(m.status)
      const d = m.date ? daysUntil(m.date) : null
      let meta = fmtDate(m.date)
      if (d !== null && !['done'].includes(dot)) {
        meta += d < 0 ? ` — ${Math.abs(d)}d overdue` : d === 0 ? ' — Today' : ` — in ${d}d`
      }
      html += `<div class="tl-item">
        <div class="tl-dot ${dot}"></div>
        <div class="tl-date">${meta}</div>
        <div class="tl-title">${m.title} ${statusBadge(m.status)}</div>
        ${m.notes ? `<div class="tl-notes">${m.notes}</div>` : ''}
      </div>`
    })
    html += `</div>`
  }

  $id('journey-content').innerHTML = html
}

  const schoolKeywords = [
    'Bromsgrove', 'Millfield', 'Cheltenham', 'Repton', 'Oundle',
    'Harrow', 'Eton', 'Rugby', 'Wellington', 'Marlborough', 'Charterhouse'
  ]
  const detected = new Set()
  ms.forEach(m => {
    schoolKeywords.forEach(k => {
      if ((m.title || '').includes(k) || (m.notes || '').includes(k)) detected.add(k)

  let html = `<div class="section-title">School Applications</div>`

    html += `<div class="card">

  } else {
    detected.forEach(school => {
      const schoolMs = ms.filter(m =>
        (m.title || '').includes(school) || (m.notes || '').includes(school)
      )
      const schoolDocs = docs.filter(d =>
        (d.title || '').includes(school) || (d.notes || '').includes(school)
      )
      const nextMs = schoolMs.find(m => {
        const d = daysUntil(m.date)
        const done = ['complete','completed','done'].some(x => (m.status||'').toLowerCase().includes(x))
        return !done && d !== null && d >= 0

      html += `<div class="card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="card-title" style="margin:0">${school}</div>
          ${nextMs ? `<span class="badge badge-amber">${daysUntil(nextMs.date)}d — ${nextMs.title}</span>` : ''}
        </div>`

      if (schoolMs.length) {
        html += `<div style="margin-bottom:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:8px">Milestones</div>`
        schoolMs.slice(0, 5).forEach(m => {

          html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
            <div class="tl-dot ${dot}" style="position:static;width:8px;height:8px;flex-shrink:0"></div>

      }

      html += `</div>`
    })
  }

  // Upcoming school deadlines
  const schoolDeadlines = ms.filter(m => {
    const d = daysUntil(m.date)
    return d !== null && d >= 0 && d <= 90 &&
      schoolKeywords.some(k => (m.title || '').includes(k))
  }).sort((a, b) => new Date(a.date) - new Date(b.date))

  if (schoolDeadlines.length) {
    html += `<div class="card">

    schoolDeadlines.forEach(m => {
      const d = daysUntil(m.date)
      html += `<tr>

        <td>${m.title}</td>
        <td>${d}</td>
        <td>${statusBadge(m.status)}</td>
      </tr>`
    })
    html += `</tbody></table></div>`
  }

  $id('schools-content').innerHTML = html
}

async function submitGolfRound() {
  const date    = $id('gr-date').value
  const course  = $id('gr-course').value.trim()
  const strokes = parseInt($id('gr-strokes').value) || 0
  const par     = parseInt($id('gr-par').value) || 0
  const type    = $id('gr-type').value
  const weather = $id('gr-weather').value.trim()
  const notes   = $id('gr-notes').value.trim()
  const msg     = $id('gr-msg')

  if (!date || !course) {
    msg.textContent = 'Date and course are required.'
    msg.className = 'form-msg error'
    return
  }

  const { data: { session } } = await sb.auth.getSession()
  if (!session) return

  // Build a minimal holes array from total if no hole-by-hole entry
  const holes = strokes && par ? [{ strokes, par }] : []

  try {
    const res = await fetch('/api/golf-rounds', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        date,
        course,
        round_type: type,
        weather,
        debrief: notes,
        holes,
        notion_student_id: D.student.id,
      })
    })

    if (res.ok) {
      const j = await res.json()
      golfRounds.unshift(j.round)
      msg.textContent = 'Round saved.'
      msg.className = 'form-msg ok'
      // Clear fields
      $id('gr-course').value = ''
      $id('gr-strokes').value = ''
      $id('gr-par').value = ''
      $id('gr-type').value = ''
      $id('gr-weather').value = ''
      $id('gr-notes').value = ''
      renderGolf()
    } else {
      const e = await res.json()
      msg.textContent = e.error || 'Failed to save round.'
      msg.className = 'form-msg error'
    }
  } catch (e) {
    msg.textContent = 'Network error. Please try again.'
    msg.className = 'form-msg error'
  }
}

// ── Documents ─────────────────────────────────────────────────────────────────
function renderDocuments() {
  const docs = D.documents || []

  let html = `<div class="section-title">Document Checklist</div>`

  if (!docs.length) {
    html += `<div class="empty">No documents in your checklist.</div>`
  } else {
    const groups = {}
    docs.forEach(d => {
      const g = d.type || 'General'
      if (!groups[g]) groups[g] = []
      groups[g].push(d)
    })

    Object.entries(groups).forEach(([group, items]) => {
      html += `<div class="card" style="padding:0 0 0 0;overflow:hidden;margin-bottom:16px">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--gold)">${group}</div>
        <div style="padding:4px 20px">`

      items.forEach(d => {
        const st = (d.status || '').toLowerCase()
        const iconCls = ['submitted','verified','uploaded'].includes(st) ? 'submitted'
                      : ['pending','in progress'].includes(st) ? 'pending'
                      : 'missing'

        let due = ''
        if (d.dueDate) {
          const days = daysUntil(d.dueDate)
          if (days !== null && days < 0) due = `<span style="color:var(--red)"> — overdue</span>`
          else if (days !== null && days <= 14) due = `<span style="color:var(--amber)"> — ${days}d</span>`
          else due = `<span style="color:var(--muted)"> — ${fmtDate(d.dueDate)}</span>`
        }

        html += `<div class="doc-item">
          <div class="doc-icon ${iconCls}"></div>
          <div class="doc-title">
            ${d.fileLink ? `<a href="${d.fileLink}" target="_blank" rel="noopener">${d.title}</a>` : d.title}
            ${due}
          </div>
          <div class="doc-meta">${statusBadge(d.status)}</div>
          ${d.notes ? `<div class="doc-meta" style="max-width:200px;text-align:right">${d.notes}</div>` : ''}
        </div>`
      })

      html += `</div></div>`
    })
  }

  // Upload form
  html += `<div class="upload-form">
    <h3>Submit a Document</h3>
    <div class="form-row">
      <div class="form-field">
        <label>Document Title</label>
        <input type="text" id="doc-title" placeholder="e.g. School Report Term 3" />
      </div>
      <div class="form-field">
        <label>Document Type</label>
        <select id="doc-type">
          <option value="">Select type...</option>
          <option>Academic Report</option>
          <option>Passport / ID</option>
          <option>Sports Certificate</option>
          <option>Reference Letter</option>
          <option>Application Form</option>
          <option>Test Results</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-field">
        <label>Google Drive / File Link</label>
        <input type="url" id="doc-link" placeholder="https://drive.google.com/..." />
      </div>
    </div>
    <div class="form-row full">
      <div class="form-field">
        <label>Notes (optional)</label>
        <input type="text" id="doc-notes" placeholder="Any notes for Satit..." />
      </div>
    </div>
    <button class="btn-submit" onclick="submitDocument()">Submit Document</button>
    <div class="form-msg" id="doc-msg"></div>
  </div>`

  $id('documents-content').innerHTML = html
}

async function submitDocument() {
  const title = $id('doc-title').value.trim()
  const type  = $id('doc-type').value
  const link  = $id('doc-link').value.trim()
  const notes = $id('doc-notes').value.trim()
  const msg   = $id('doc-msg')

  if (!title) {
    msg.textContent = 'Document title is required.'
    msg.className = 'form-msg error'
    return
  }

  const { data: { session } } = await sb.auth.getSession()
  if (!session) return

  try {
    const res = await fetch('/api/upload-doc', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ doc_title: title, doc_type: type, doc_link: link, doc_notes: notes })
    })

    if (res.ok) {
      msg.textContent = 'Document submitted. Satit will review shortly.'
      msg.className = 'form-msg ok'
      $id('doc-title').value = ''
      $id('doc-type').value = ''
      $id('doc-link').value = ''
      $id('doc-notes').value = ''
    } else {
      const e = await res.json()
      msg.textContent = e.error || 'Submission failed.'
      msg.className = 'form-msg error'
    }
  } catch (e) {
    msg.textContent = 'Network error. Please try again.'
    msg.className = 'form-msg error'
  }
}

// ── Render all tabs ───────────────────────────────────────────────────────────
function renderAll() {
  renderOverview()
  renderJourney()
  renderSchools()
  renderServices()
  renderProfile()
  renderGolf()
  renderDocuments()
}

// ── Boot ──────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    $id('auth-screen').style.display = 'none'
    $id('loading').classList.add('show')

    try {
      const [dataRes] = await Promise.all([
        loadData(session.access_token),
      ])

      D = dataRes
      userRole = D.role || 'parent'
      golfRounds = await loadGolfRounds(session.access_token, D.student.id)

      $id('header-name').textContent = D.student.studentName || 'Parent'
      renderAll()

      $id('loading').classList.remove('show')
      $id('app').style.display = 'flex'
      $id('app').classList.add('visible')

    } catch (err) {
      console.error('Load error:', err)
      $id('loading').classList.remove('show')
      $id('auth-screen').style.display = 'flex'
      const errEl = $id('auth-error')
      errEl.textContent = 'Failed to load your data. Please try again.'
      errEl.style.display = 'block'
      await sb.auth.signOut()
    }

  } else {
    $id('loading').classList.remove('show')
    $id('auth-screen').style.display = 'flex'
  }
})
</script>
</body>
</html>
